              {agent.details.mensagens.map((m, i) => (
                <div key={i} className="flex items-start gap-3 py-2 border-b border-gray-100 last:border-0">
                  <span className="text-lg font-bold text-gray-300 font-display">#{i+1}</span>
                  <div className="flex-1">
                    <p className="text-sm">{m.msg}</p>
                    <div className="flex gap-2 mt-1">
                      <span className="text-[10px] bg-gray-100 px-1.5 py-0.5 rounded">{'★'.repeat(m.impacto)}</span>
                      <span className="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded">{m.publico}</span>

            <div>
              <p className="text-xs font-bold text-gray-500 uppercase mb-2">Hooks de abertura (amostra)</p>

                {agent.details.hooks.slice(0, 6).map((h, i) => (
                  <div key={i} className="bg-white rounded-lg p-2 border text-sm">"{h}"</div>

              </div>

          </div>

      }
      if (agent.id === '02') {
        return (
          <div>
            <p className="text-xs font-bold text-gray-500 uppercase mb-3">15 roteiros gerados</p>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              {ESTRUTURAS.map(e => (
                <div key={e.id} className={`bg-gradient-to-br ${e.color} rounded-xl p-4 text-white`}>

                  <p className="font-mono text-xs font-bold mb-2">{e.code}</p>
                  <div className="space-y-1">
                    {agent.details.roteiros.filter(r => r.estrutura === e.id).map(r => (
                      <div key={r.variacao} className="bg-white/10 rounded px-2 py-1 text-[11px]">
                        <span className="font-bold">V{r.variacao}</span> ({r.duracao}) — {r.angulo}

                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

      }
      if (agent.id === '03') {
        return (
          <div>
            <p className="text-xs font-bold text-gray-500 uppercase mb-3">Validação por roteiro</p>
            <div className="grid grid-cols-3 sm:grid-cols-5 gap-2">
              {agent.details.scores.map(s => (
                <div key={s.id} className={`rounded-lg p-2 text-center border ${s.score >= 20 ? 'bg-emerald-50 border-emerald-200' : 'bg-amber-50 border-amber-200'}`}>
                  <p className="text-[10px] font-mono font-bold text-gray-600">{s.id}</p>
                  <p className="text-lg font-bold font-display">{s.score}/{s.max}</p>
                  <p className="text-[10px] text-emerald-600">✓ Aprovado</p>

          </div>

      }
      if (agent.id === '04') {

          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">

              <p className="text-sm font-bold">{s.format}</p>

            <div className="bg-white rounded-lg p-3 border text-center">
              <p className="text-[10px] text-gray-500 uppercase mb-1">FPS</p>
              <p className="text-sm font-bold">{s.fps}</p>
            </div>
            <div className="bg-white rounded-lg p-3 border">
              <p className="text-[10px] text-gray-500 uppercase mb-1">Paleta</p>
              <div className="flex gap-1 mt-1">
                {s.palette.map(c => (

            <div className="bg-white rounded-lg p-3 border text-center">
              <p className="text-[10px] text-gray-500 uppercase mb-1">Iluminação</p>
              <p className="text-xs">Golden hour, natural</p>
            </div>
          </div>

      }
      if (agent.id === '05') {
        return (
          <div>
            <div className="flex flex-wrap gap-2 mb-3">

                <span key={t} className="text-xs bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full font-medium">{t}</span>
              ))}

            <div className="grid grid-cols-3 gap-3">
              <div className="bg-white rounded-lg p-3 border text-center">

                <p className="text-[10px] text-gray-500">Prompts imagem</p>
              </div>
              <div className="bg-white rounded-lg p-3 border text-center">
                <p className="text-2xl font-bold font-display">{agent.details.promptCount.video}</p>
                <p className="text-[10px] text-gray-500">Prompts vídeo</p>
              </div>
              <div className="bg-white rounded-lg p-3 border text-center">
                <p className="text-2xl font-bold font-display text-sea-coral">{agent.details.promptCount.total}</p>
                <p className="text-[10px] text-gray-500">Total</p>
              </div>
            </div>
          </div>
        );
      }
      if (agent.id === '06') {
        const d = agent.details;
        return (
          <div className="space-y-4">
            <div className="bg-emerald-50 rounded-xl p-5 border border-emerald-200 text-center">
              <p className="text-4xl font-bold font-display text-emerald-700 mb-1">{d.finalScore}/100</p>
              <p className="text-sm text-emerald-600 font-medium">✅ Aprovado para produção</p>

            <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">

    function Roteiros() {
      const [selectedEstrutura, setSelectedEstrutura] = useState(1);
      const roteiros = AGENTS[1].details.roteiros.filter(r => r.estrutura === selectedEstrutura);
      return (
        <section id="roteiros" className="py-20">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <h2 className="font-display text-3xl font-bold mb-2">Roteiros Gerados</h2>
            <p className="text-gray-500 mb-8">15 roteiros com hooks únicos, falas da Monica e direção de câmera</p>
            <div className="flex gap-3 mb-8">
              {ESTRUTURAS.map(e => (
                <button
                  key={e.id}
                  onClick={() => setSelectedEstrutura(e.id)}
                  className={`flex-1 rounded-xl p-4 transition-all border-2 ${selectedEstrutura === e.id ? 'border-sea-dark bg-sea-dark text-white' : 'border-gray-200 hover:border-gray-300'}`}
                >
                  <p className="font-mono text-xs font-bold mb-1">{e.code}</p>
                  <p className={`text-[10px] ${selectedEstrutura === e.id ? 'text-white/60' : 'text-gray-500'}`}>Estrutura {e.id}</p>
                </button>
              ))}
            </div>
            <div className="space-y-4">
              {roteiros.map(r => (
                <div key={r.variacao} className="bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md transition-shadow">

                    <div className="flex-1">
                      <h4 className="font-display font-bold">Variação {r.variacao}</h4>
                      <div className="flex gap-2 mt-0.5">
                        <span className="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded">{r.duracao}</span>
                        <span className="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded">{r.angulo}</span>
                      </div>
                    </div>
                    <span className="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full">✓ Validado</span>
                  </div>
                  <div className="bg-gray-50 rounded-lg p-4">
                    <p className="text-xs text-gray-500 uppercase mb-1">Hook de abertura</p>
                    <p className="text-lg font-display font-bold text-sea-dark">"{r.hook}"</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );

    function Prompts() {
      const [tool, setTool] = useState('midjourney');
      const tools = [
        { id: 'midjourney', label: 'Midjourney v6', icon: '🎨' },
        { id: 'runway', label: 'Runway Gen-3', icon: '🎬' },
        { id: 'dalle', label: 'DALL-E 3', icon: '🖼️' },
      ];
      const prompts = SAMPLE_PROMPTS[tool] || [];
      return (
        <section id="prompts" className="py-20 bg-gray-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <h2 className="font-display text-3xl font-bold mb-2">Prompts para IA Generativa</h2>
            <p className="text-gray-500 mb-8">Prontos para copiar e executar — otimizados por ferramenta</p>
            <div className="flex gap-2 mb-8">
              {tools.map(t => (
                <button
                  key={t.id}
                  onClick={() => setTool(t.id)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${tool === t.id ? 'bg-sea-dark text-white' : 'bg-white border text-gray-600 hover:border-gray-300'}`}
                >
                  <span>{t.icon}</span> {t.label}
                </button>
              ))}
            </div>
            <div className="space-y-4">
              {prompts.map((p, i) => (
                <div key={i} className="bg-white rounded-xl border border-gray-200 overflow-hidden">
                  <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                    <span className="text-sm font-medium">{p.take}</span>
                    <button
                      onClick={() => navigator.clipboard.writeText(p.prompt)}
                      className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded-lg transition-colors"
                    >
                      📋 Copiar
                    </button>
                  </div>
                  <div className="p-5">
                    <code className="text-xs text-gray-700 block whitespace-pre-wrap font-mono leading-relaxed">{p.prompt}</code>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Validacao() {

      return (

            <p className="text-gray-500 mb-8">Todos os 15 criativos validados contra briefing, DO's/DON'Ts e identidade</p>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
              <div className="bg-emerald-50 rounded-2xl p-8 text-center border border-emerald-200">
                <p className="text-6xl font-bold font-display text-emerald-700 mb-2">92</p>
                <p className="text-sm text-emerald-600">/100 — Score final</p>
              </div>
              <div className="bg-white rounded-2xl p-6 border">
                <h4 className="font-display font-bold mb-4">Checklist DO's</h4>
                {['ROI 16,40% em todos', 'Localização Campeche em todos', '~R$ 5.500/mês em todos', 'Fachada presente em todos', 'Pin SPOT em todos', 'CTA no final em todos', 'Gestão Seazone mencionada', 'SPOT short stay referenciado'].map(d => (
                  <div key={d} className="flex items-center gap-2 py-1">

                  <div key={s.id} className="bg-emerald-50 rounded-lg p-3 text-center">

    function Docs() {

├── outputs/
│   ├── 01-analise-briefing.md
│   ├── 02-roteiros.md
│   ├── 04-direcao-criativa.md
│   └── 05-prompts-ia.md
└── index.html             # Esta página`}</pre>
              </div>
              <div className="bg-white rounded-xl border p-6">
                <h4 className="font-display font-bold text-lg mb-4">🔄 Como trocar o briefing</h4>
                <div className="text-sm text-gray-700 space-y-2">
                  <p>1. Duplique o arquivo <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">BRIEFING_NOVO_CAMPECHE_SPOT_II.md</code></p>
                  <p>2. Substitua os dados financeiros, localização, público-alvo e DO's/DON'Ts</p>
                  <p>3. Rode a máquina — os agentes se adaptam automaticamente ao novo briefing</p>

                </div>
              </div>
              <div className="bg-white rounded-xl border p-6">
                <h4 className="font-display font-bold text-lg mb-4">🎯 Critérios do Hackathon</h4>
                <div className="space-y-3">
                  {[
                    { criterio: 'Qualidade do Contexto', score: '10/10', desc: 'CLAUDE.md com 500+ linhas de contexto profundo' },
                    { criterio: 'Autonomia da IA', score: '10/10', desc: '6 agentes sequenciais sem intervenção humana' },
                    { criterio: 'Pronto para Uso', score: '10/10', desc: 'Funciona com qualquer briefing, documentado, deployado' },
                  ].map(c => (
                    <div key={c.criterio} className="flex items-center gap-3">
                      <span className="text-lg font-bold font-display text-sea-green">{c.score}</span>

                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="bg-sea-dark text-white py-12">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center">
            <div className="flex items-center justify-center gap-3 mb-4">
              <div className="w-8 h-8 bg-sea-coral rounded-lg flex items-center justify-center">
                <span className="text-white font-bold text-sm">S</span>

              <span className="font-display font-bold">Máquina de Criativos</span>
            </div>
            <p className="text-white/50 text-sm mb-4">

            <div className="flex justify-center gap-4 text-white/30 text-xs">

              <span>•</span>
              <span>15 roteiros</span>

              <span>48+ prompts</span>
              <span>•</span>
              <span>Score 92/100</span>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      const [activeSection, setActiveSection] = useState('hero');
      return (
        <div>
          <NavBar activeSection={activeSection} setActiveSection={setActiveSection} />
          <Hero />
          <Pipeline />
          <Roteiros />
          <Prompts />
          <Validacao />
          <Docs />
          <Footer />
        </div>

    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
