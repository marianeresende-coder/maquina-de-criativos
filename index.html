<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ============================================================
// HELPERS
// ============================================================

function formatTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min > 0) return `${min}m ${sec.toString().padStart(2, '0')}s`;
  return `${sec}s`;
}

function useTimer(running) {
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(null);
  useEffect(() => {
    if (running) {
      startRef.current = Date.now();
      const iv = setInterval(() => setElapsed(Date.now() - startRef.current), 500);
      return () => clearInterval(iv);
    }
  }, [running]);
  return elapsed;
}

const PIECE_NAMES = [
  'Peça Estática',
  'Vídeo Narrado 15s',
  'Vídeo Apresentadora 30s',
];

const PIECE_ICONS = ['🖼️', '🎥', '🎬'];

// ============================================================
// STREAMING API CALL
// ============================================================

async function generatePiece(briefing, pieceNumber, onChunk, onDone, onError) {
  try {
    const res = await fetch('/api/generate-roteiro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ briefing, pieceNumber }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Erro desconhecido' }));
      onError(err.error || `HTTP ${res.status}`);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) { onDone(); return; }
            if (data.error) { onError(data.error); return; }
            if (data.text) onChunk(data.text);
          } catch {}
        }
      }
    }
    onDone();
  } catch (err) {
    onError(err.message || 'Erro de conexão');
  }
}

async function validatePiece(briefing, roteiro, pieceNumber) {
  try {
    const res = await fetch('/api/validate-roteiro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ briefing, roteiro, pieceNumber }),
    });
    if (!res.ok) return { approved: true, summary: 'Validação indisponível' };
    return await res.json();
  } catch {
    return { approved: true, summary: 'Validação indisponível' };
  }
}

async function fixPiece(briefing, roteiro, errors, pieceNumber, onChunk, onDone, onError) {
  try {
    const res = await fetch('/api/fix-roteiro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ briefing, roteiro, errors, pieceNumber }),
    });
    if (!res.ok) { onError(`HTTP ${res.status}`); return; }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) { onDone(); return; }
            if (data.error) { onError(data.error); return; }
            if (data.text) onChunk(data.text);
          } catch {}
        }
      }
    }
    onDone();
  } catch (err) { onError(err.message); }
}

// ============================================================
// AGENT 01 — BRIEFING VALIDATOR (runs in browser)
// ============================================================

const REQUIRED_SECTIONS = [
  { key: 'projeto', label: 'Projeto', fields: [
    { path: 'nome', label: 'Nome' }, { path: 'endereco', label: 'Endereço' },
    { path: 'cidade', label: 'Cidade' }, { path: 'tipo', label: 'Tipo' },
  ]},
  { key: 'dados_financeiros', label: 'Dados Financeiros', fields: [
    { path: 'ticket_medio.valor', label: 'Ticket médio' },
    { path: 'roi_estimado.valor', label: 'ROI estimado' },
    { path: 'rentabilidade_liquida_estimada.valor', label: 'Rentabilidade líquida' },
    { path: 'valorizacao_estimada.valor', label: 'Valorização estimada' },
    { path: 'rendimento_mensal_estimado', label: 'Rendimento mensal' },
    { path: 'estrutura.quantidade_cotas', label: 'Quantidade de cotas' },
    { path: 'panorama_competitivo', label: 'Panorama competitivo', isObject: true },
  ]},
  { key: 'localizacao', label: 'Localização', fields: [
    { path: 'caracteristicas_principais', label: 'Características principais', isArray: true, minItems: 1 },
  ]},
  { key: 'pontos_fortes', label: 'Pontos Fortes', fields: [
    { path: 'hierarquia', label: 'Hierarquia de pontos fortes', isArray: true, minItems: 3 },
  ]},
  { key: 'dos', label: "DO's", fields: [
    { path: 'diretrizes', label: 'Diretrizes DO', isArray: true, minItems: 1 },
  ]},
  { key: 'donts', label: "DON'Ts", fields: [
    { path: 'diretrizes', label: "Diretrizes DON'T", isArray: true, minItems: 1 },
  ]},
  { key: 'publico_alvo', label: 'Público-Alvo', fields: [
    { path: 'prioridades', label: 'Prioridades de público', isArray: true, minItems: 1 },
  ]},
  { key: 'perfil_hospede', label: 'Perfil do Hóspede', fields: [
    { path: 'tipo_principal', label: 'Tipo principal' },
    { path: 'fatores_decisao', label: 'Fatores de decisão', isArray: true, minItems: 1 },
  ]},
  { key: 'estrutura_criativos', label: 'Estrutura de Criativos', fields: [
    { path: 'pontos_fortes_obrigatorios', label: 'Pontos fortes obrigatórios', isArray: true, minItems: 1 },
    { path: 'formatos', label: 'Formatos', isArray: true, minItems: 1 },
    { path: 'instrucoes_visuais_obrigatorias', label: 'Instruções visuais', isArray: true, minItems: 1 },
  ]},
];

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}

function validateBriefing(data) {
  const results = [];
  let allPassed = true;
  for (const section of REQUIRED_SECTIONS) {
    const sectionData = data[section.key];
    const fieldResults = [];
    let sectionPassed = true;
    if (!sectionData) {
      results.push({ key: section.key, label: section.label, passed: false, error: 'Seção ausente', fields: [] });
      allPassed = false;
      continue;
    }
    for (const field of section.fields) {
      const value = getNestedValue(sectionData, field.path);
      let passed = true, error = null;
      if (field.isArray) {
        if (!Array.isArray(value) || value.length < (field.minItems || 1)) { passed = false; error = 'Array vazio'; }
      } else if (field.isObject) {
        if (!value || typeof value !== 'object' || Object.keys(value).length === 0) { passed = false; error = 'Objeto ausente'; }
      } else {
        if (value === undefined || value === null || value === '') { passed = false; error = 'Ausente'; }
      }
      if (!passed) sectionPassed = false;
      const displayValue = field.isArray ? (Array.isArray(value) ? `${value.length} item(ns)` : null) :
                           field.isObject ? (value ? `${Object.keys(value).length} campo(s)` : null) : value;
      fieldResults.push({ path: field.path, label: field.label, passed, error, value: displayValue });
    }
    if (!sectionPassed) allPassed = false;
    results.push({ key: section.key, label: section.label, passed: sectionPassed, fields: fieldResults });
  }
  return { allPassed, results };
}

// COMPONENTS

function Header() {

        <div className="w-8 h-8 bg-sea-coral rounded-lg flex items-center justify-center">
          <span className="font-bold text-sm">S</span>
        </div>
        <div>
          <h1 className="font-display font-bold text-lg leading-tight">Máquina de Criativos</h1>
          <p className="text-[10px] text-white/50">Seazone — Geração autônoma de criativos</p>

}

function StepIndicator({ steps, currentStep }) {
  return (
    <div className="flex items-center gap-1 overflow-x-auto pb-2">
      {steps.map((s, i) => (
        <div key={i} className="flex items-center gap-1 flex-shrink-0">
          <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all
            ${i < currentStep ? 'bg-sea-green text-white' :
              i === currentStep ? 'bg-sea-coral text-white ring-2 ring-sea-coral/30' :
              'bg-gray-200 text-gray-400'}`}>
            {i < currentStep ? '✓' : i + 1}
          </div>
          {i < steps.length - 1 && (
            <div className={`w-6 h-0.5 ${i < currentStep ? 'bg-sea-green' : 'bg-gray-200'}`} />

// ============================================================
// STEP 1 — INPUT URL
// ============================================================

function Step1_Input({ onSubmit }) {
  const [url, setUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleSubmit = async () => {
    if (!url.trim()) return;
    setLoading(true);
    setError(null);
    try {
      const res = await fetch('/api/fetch-briefing', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url.trim() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao buscar briefing');
      onSubmit(data, url.trim());
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fade-in">
      <div className="bg-white rounded-xl border-2 border-dashed border-gray-300 p-8 text-center">
        <div className="w-16 h-16 bg-sea-dark/5 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">📋</div>
        <h3 className="font-display font-bold text-lg mb-2">Cole a URL do Lovable</h3>
        <p className="text-sm text-gray-500 mb-6">A máquina vai buscar o briefing.json e validar todas as seções</p>
        <div className="max-w-xl mx-auto">
          <div className="flex gap-2">
            <input type="url" value={url} onChange={e => setUrl(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSubmit()}
              placeholder="https://nomedoempreendimento.lovable.app"
              className="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-sea-coral focus:ring-2 focus:ring-sea-coral/20" />
            <button onClick={handleSubmit} disabled={loading || !url.trim()}
              className="bg-sea-coral hover:bg-sea-coral/90 disabled:bg-gray-300 text-white font-bold px-6 py-3 rounded-lg text-sm transition-colors">
              {loading ? 'Buscando...' : 'Validar'}
            </button>
          </div>
          {error && <div className="mt-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700 text-left fade-in">{error}</div>}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// STEP 2 — VALIDATION
// ============================================================

function Step2_Validation({ data, url, onApproved, onReset }) {
  const validation = validateBriefing(data);
  const projectName = data.projeto?.nome || 'Empreendimento sem nome';
  const passedCount = validation.results.filter(r => r.passed).length;

  return (
    <div className="fade-in">
      <div className={`rounded-xl p-5 mb-6 ${validation.allPassed ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-display font-bold text-lg">{validation.allPassed ? '✅' : '❌'} {projectName}</h3>
          <span className={`text-sm font-bold ${validation.allPassed ? 'text-emerald-600' : 'text-red-600'}`}>
            {passedCount}/{validation.results.length} seções
          </span>
        </div>
        <p className="text-sm text-gray-600 mb-1">{url}</p>
        <p className={`text-sm font-medium ${validation.allPassed ? 'text-emerald-700' : 'text-red-700'}`}>
          {validation.allPassed ? 'Briefing completo. Pronto para gerar roteiros.' : 'Briefing incompleto. Corrija no Lovable.'}
        </p>
      </div>

      <div className="space-y-3 mb-6">
        {validation.results.map(section => (
          <div key={section.key} className={`bg-white rounded-xl border overflow-hidden ${section.passed ? 'border-emerald-200' : 'border-red-200'}`}>
            <div className={`flex items-center gap-3 px-4 py-3 ${section.passed ? 'bg-emerald-50' : 'bg-red-50'}`}>
              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${section.passed ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                {section.passed ? '✓' : '✕'}
              </div>
              <span className="font-display font-bold text-sm">{section.label}</span>
              {!section.passed && section.error && <span className="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full ml-auto">{section.error}</span>}
            </div>
            {section.fields.length > 0 && (
              <div className="divide-y divide-gray-100">
                {section.fields.map(f => (
                  <div key={f.path} className={`flex items-center justify-between px-4 py-2.5 ${f.passed ? '' : 'bg-red-50/50'}`}>
                    <div className="flex items-center gap-2">
                      <span className={`text-sm ${f.passed ? 'text-emerald-500' : 'text-red-500'}`}>{f.passed ? '✓' : '✕'}</span>
                      <span className="text-sm text-gray-700">{f.label}</span>
                    </div>
                    {f.passed && f.value ? (
                      <span className="text-sm font-medium text-gray-900 bg-emerald-50 px-2 py-0.5 rounded">
                        {typeof f.value === 'string' && f.value.length > 50 ? f.value.substring(0, 50) + '...' : f.value}
                      </span>
                    ) : !f.passed ? (
                      <span className="text-xs font-medium text-red-600 bg-red-100 px-2 py-0.5 rounded">{f.error}</span>
                    ) : null}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      <div className="flex gap-3">
        <button onClick={onReset} className="border border-gray-300 text-gray-600 px-4 py-2.5 rounded-lg text-sm hover:bg-gray-50">← Novo briefing</button>
        {validation.allPassed && (
          <button onClick={() => onApproved(data)} className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-2.5 rounded-lg text-sm">
            Gerar Roteiros →
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PIECE CARD — shows streaming roteiro + validation
// ============================================================

function PieceCard({ pieceNumber, briefing, autoStart }) {
  const [status, setStatus] = useState('idle'); // idle, generating, validating, approved, rejected, error
  const [text, setText] = useState('');
  const [validation, setValidation] = useState(null);
  const [error, setError] = useState(null);
  const [startTime, setStartTime] = useState(null);
  const [endTime, setEndTime] = useState(null);
  const [expanded, setExpanded] = useState(true);
  const textRef = useRef('');
  const started = useRef(false);
  const containerRef = useRef(null);

  const elapsed = useTimer(status === 'generating' || status === 'validating');

  useEffect(() => {
    if (autoStart && !started.current) {
      started.current = true;
      runPiece();
    }
  }, [autoStart]);

  const runPiece = async () => {
    setStatus('generating');
    setStartTime(Date.now());
    setText('');
    textRef.current = '';

    await new Promise((resolve) => {
      generatePiece(
        briefing, pieceNumber,
        (chunk) => {
          textRef.current += chunk;
          setText(textRef.current);
          // Auto-scroll
          if (containerRef.current) {
            containerRef.current.scrollTop = containerRef.current.scrollHeight;
          }
        },
        () => resolve(),
        (err) => { setError(err); setStatus('error'); resolve(); }
      );
    });

    if (textRef.current && !error) {
      setStatus('validating');
      const result = await validatePiece(briefing, textRef.current, pieceNumber);
      setValidation(result);
      setStatus(result.approved ? 'approved' : 'rejected');
      setEndTime(Date.now());
    }
  };

  const totalTime = endTime && startTime ? endTime - startTime : elapsed;
  const name = PIECE_NAMES[pieceNumber - 1];
  const icon = PIECE_ICONS[pieceNumber - 1];

  const statusColors = {
    idle: 'border-gray-200 opacity-60',
    generating: 'border-sea-coral shadow-md',
    validating: 'border-yellow-300 shadow-md',
    approved: 'border-emerald-300',
    rejected: 'border-red-300',
    error: 'border-red-300',
  };

  const statusBadge = {
    idle: { bg: 'bg-gray-100 text-gray-400', label: 'Aguardando' },
    generating: { bg: 'bg-sea-coral/10 text-sea-coral', label: 'Gerando...' },
    validating: { bg: 'bg-yellow-100 text-yellow-700', label: 'Validando...' },
    approved: { bg: 'bg-emerald-100 text-emerald-700', label: 'Aprovado' },
    rejected: { bg: 'bg-red-100 text-red-700', label: 'Reprovado' },
    error: { bg: 'bg-red-100 text-red-700', label: 'Erro' },
  };

  const badge = statusBadge[status];

  return (
    <div className={`bg-white rounded-xl border-2 overflow-hidden transition-all fade-in ${statusColors[status]}`}>
      {/* Header */}
      <div className="flex items-center gap-3 px-5 py-4 cursor-pointer" onClick={() => text && setExpanded(!expanded)}>
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0
          ${status === 'approved' ? 'bg-emerald-100' : status === 'generating' ? 'bg-sea-coral/10' : 'bg-gray-100'}`}>
          {status === 'approved' ? '✓' : icon}
        </div>
        <div className="flex-1">
          <div className="flex items-center gap-2">
            <span className="text-[10px] font-mono bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">#{pieceNumber}</span>
            <h3 className="font-display font-bold">{name}</h3>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {totalTime > 0 && (
            <span className={`text-xs font-mono px-2 py-1 rounded-full ${
              totalTime > 600000 ? 'bg-red-100 text-red-700' :
              totalTime > 300000 ? 'bg-yellow-100 text-yellow-700' :
              'bg-gray-100 text-gray-600'
            }`}>{formatTimer(totalTime)}</span>
          )}
          <span className={`text-xs font-medium px-3 py-1 rounded-full ${badge.bg}`}>
            {(status === 'generating' || status === 'validating') && <span className="inline-block w-2 h-2 bg-current rounded-full mr-1.5 pulse" />}
            {badge.label}
          </span>
          {text && (
            <span className="text-gray-400 text-sm">{expanded ? '▼' : '▶'}</span>
          )}
        </div>
      </div>

      {/* Content */}
      {expanded && text && (
        <div ref={containerRef} className="border-t border-gray-100 px-5 py-4 max-h-96 overflow-y-auto bg-gray-50">
          <div className="roteiro-text text-gray-800">{text}</div>
          {status === 'generating' && <span className="inline-block w-2 h-4 bg-sea-coral animate-pulse ml-0.5" />}
        </div>
      )}

      {/* Validation result */}
      {validation && expanded && (
        <div className={`border-t px-5 py-3 text-sm ${validation.approved ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
          <strong>{validation.approved ? '✅ Validação:' : '❌ Validação:'}</strong> {validation.summary}
          {validation.errors && validation.errors.length > 0 && (
            <ul className="mt-2 space-y-1">
              {validation.errors.map((e, i) => <li key={i} className="text-xs">• {e}</li>)}
            </ul>
          )}
        </div>
      )}

      {/* Error */}
      {error && (
        <div className="border-t px-5 py-3 bg-red-50 text-sm text-red-700">
          <strong>Erro:</strong> {error}
        </div>
      )}
    </div>
  );
}

// ============================================================
// STEP 3 — PIPELINE (real execution!)
// ============================================================

function AgentCard({ number, name, icon, status, description, children, timer }) {
  const colors = {
    idle: 'border-gray-200 opacity-60',
    running: 'border-yellow-300 shadow-md',
    success: 'border-emerald-300',
    error: 'border-red-300',
  };
  const badges = {
    idle: { bg: 'bg-gray-100 text-gray-400', label: 'Aguardando' },
    running: { bg: 'bg-yellow-100 text-yellow-700', label: description || 'Rodando...' },
    success: { bg: 'bg-emerald-100 text-emerald-700', label: 'Concluído' },
    error: { bg: 'bg-red-100 text-red-700', label: 'Erro' },
  };
  const badge = badges[status];
  return (
    <div className={`bg-white rounded-xl border-2 overflow-hidden transition-all ${colors[status]}`}>
      <div className="flex items-center gap-3 px-5 py-4">
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0
          ${status === 'success' ? 'bg-emerald-100' : status === 'running' ? 'bg-yellow-100' : 'bg-gray-100'}`}>
          {status === 'success' ? '✓' : icon}
        </div>
        <div className="flex-1">
          <div className="flex items-center gap-2">
            <span className="text-[10px] font-mono bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">#{number}</span>
            <h3 className="font-display font-bold">{name}</h3>
          </div>
          {status === 'running' && <p className="text-sm text-yellow-700 mt-1 flex items-center gap-2">
            <span className="w-2 h-2 bg-yellow-500 rounded-full pulse" />{description}
          </p>}
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {timer > 0 && <span className="text-xs font-mono px-2 py-1 rounded-full bg-gray-100 text-gray-600">{formatTimer(timer)}</span>}
          <span className={`text-xs font-medium px-3 py-1 rounded-full ${badge.bg}`}>
            {status === 'running' && <span className="inline-block w-2 h-2 bg-current rounded-full mr-1.5 pulse" />}
            {badge.label}
          </span>
        </div>
      </div>
      {children && <div className="border-t border-gray-100">{children}</div>}
    </div>
  );
}

function Step3_Pipeline({ data, onReset }) {
  const projectName = data.projeto?.nome || 'Empreendimento';

  // --- Phase 1: Roteiros (Agents 02+03) ---
  const [activePieces, setActivePieces] = useState([1]);
  const [completedPieces, setCompletedPieces] = useState(new Set());
  const [roteiroTexts, setRoteiroTexts] = useState({});
  const roteirosTimer = useTimer(completedPieces.size < 3);

  // --- Phase 2: Direction (Agent 04) ---
  const [phase, setPhase] = useState('roteiros'); // roteiros, direction, creatives, validation, done
  const [direction, setDirection] = useState(null);
  const [dirStatus, setDirStatus] = useState('idle');
  const dirTimer = useTimer(dirStatus === 'running');

  // --- Phase 3: Image generation (Agent 05) ---
  const [generatedImages, setGeneratedImages] = useState([]);
  const [genStatus, setGenStatus] = useState('idle');
  const [genProgress, setGenProgress] = useState('');
  const genTimer = useTimer(genStatus === 'running');

  // --- Phase 4: Validation (Agent 06) ---
  const [finalValidation, setFinalValidation] = useState(null);
  const [valStatus, setValStatus] = useState('idle');
  const valTimer = useTimer(valStatus === 'running');

  // --- Approval, Reject & Save ---
  const [approvedPieces, setApprovedPieces] = useState({});
  const [savingPiece, setSavingPiece] = useState(null);
  const [rejectingPiece, setRejectingPiece] = useState(null);
  const [regeneratingPiece, setRegeneratingPiece] = useState(null);

  const handleApprove = async (pieceNum, mediaItem) => {
    const pieceTypes = { 1: 'estatico', 2: 'narrado', 3: 'apresentadora' };
    setSavingPiece(pieceNum);
    try {
      const res = await fetch('/api/save-approved', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fileUrl: mediaItem.url,
          pieceNumber: pieceNum,
          pieceType: pieceTypes[pieceNum],
          projectName: projectName,
          fileName: mediaItem.type === 'audio' ? 'narracao.mp3' : `peca-${pieceNum}-cena-${mediaItem.scene}.${mediaItem.type === 'video' ? 'mp4' : 'png'}`,
        }),
      });
      const result = await res.json();
      if (result.url) {
        setApprovedPieces(prev => ({
          ...prev,
          [pieceNum]: [...(prev[pieceNum] || []), { ...mediaItem, savedUrl: result.url, savedAt: result.savedAt }],
        }));
      }
    } catch (err) {
      alert('Erro ao salvar: ' + err.message);
    }
    setSavingPiece(null);
  };

  const handleApproveAll = async (pieceNum) => {
    const items = generatedImages.filter(i => i.url && i.piece === pieceNum);
    for (const item of items) {
      await handleApprove(pieceNum, item);
    }
  };

  const handleReject = async (pieceNum) => {
    setRegeneratingPiece(pieceNum);
    // Remove os itens antigos desta peça
    setGeneratedImages(prev => prev.filter(i => i.piece !== pieceNum));

    // Buscar a direção da peça novamente e re-executar
    const pieceDir = (direction?.pieces || []).find(p =>
      p.pieceNumber === pieceNum || (pieceNum === 1 && (p.type || '').includes('estatico')) ||
      (pieceNum === 2 && (p.type || '').includes('narrado')) ||
      (pieceNum === 3 && (p.type || '').includes('apresentadora'))
    );

    if (pieceDir) {
      // Re-executar só essa peça
      const tempDir = { pieces: [pieceDir] };
      await runCreatives(tempDir);
    }
    setRegeneratingPiece(null);
  };

  // Collect roteiro texts from PieceCardWrappers
  const handlePieceComplete = useCallback((pieceNum, text) => {
    setRoteiroTexts(prev => ({ ...prev, [pieceNum]: text }));
  }, []);

  const handlePieceStatus = useCallback((pieceNum, status) => {
    if (status === 'approved' || status === 'error') {
      setCompletedPieces(prev => { const n = new Set(prev); n.add(pieceNum); return n; });
      const next = pieceNum + 1;
      if (next <= 3) setActivePieces(prev => prev.includes(next) ? prev : [...prev, next]);
    }
  }, []);

  const allRoteiros = completedPieces.size >= 3;

  // Auto-start Agent 04 when roteiros done
  useEffect(() => {
    if (allRoteiros && phase === 'roteiros') {
      setPhase('direction');
      runDirection();
    }
  }, [allRoteiros]);

  // --- Agent 04: Generate direction (1 peça por vez, sequencial) ---
  const runDirection = async () => {
    setDirStatus('running');
    try {
      const allPieces = [];

      // Gerar direção para cada peça sequencialmente (1, 2, 3)
      for (let pn = 1; pn <= 3; pn++) {
        setGenProgress(`Agente 04: gerando direção da peça ${pn}/3...`);
        const res = await fetch('/api/generate-direction', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            briefing: data,
            roteiro: roteiroTexts[pn] || '',
            pieceNumber: pn,
          }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `Erro no Agente 04 peça ${pn}`);
        // Garantir que pieceNumber e type estão setados
        const pieceTypes = { 1: 'estatico', 2: 'narrado', 3: 'apresentadora' };
        result.pieceNumber = pn;
        result.type = result.type || pieceTypes[pn];
        // Garantir que scenes tem sceneNumber
        (result.scenes || []).forEach((s, i) => { s.sceneNumber = s.sceneNumber || (i + 1); });
        allPieces.push(result);
      }

      const fullDirection = { pieces: allPieces };
      setDirection(fullDirection);
      setDirStatus('success');
      setPhase('creatives');
      runCreatives(fullDirection);
    } catch (err) {
      setDirStatus('error');
      setGenProgress('Erro: ' + err.message);
    }
  };

  // --- Agent 05: Execute creatives (1 peça por vez, sequencial) ---
  const runCreatives = async (dir) => {
    setGenStatus('running');
    const pieces = dir.pieces || [];
    const allMedia = [];

    // TRAVA DE CRÉDITO: máximo de chamadas pagas por execução
    const MAX_API_CALLS = 10; // estático(1) + narrado(3 kling + 1 elevenlabs) + apresentadora(1 veo3 + 2 kling) = 8
    let apiCallCount = 0;
    const canCallAPI = () => {
      if (apiCallCount >= MAX_API_CALLS) {
        setGenProgress(`⛔ LIMITE DE ${MAX_API_CALLS} CHAMADAS ATINGIDO. Parando pra economizar créditos.`);
        return false;
      }
      apiCallCount++;
      return true;
    };

    for (const piece of pieces) {
      const pn = piece.pieceNumber;
      const pType = piece.type || '';

      // --- PEÇA 1: ESTÁTICO (image-to-image com referência como template) ---
      if (pn === 1 || pType.includes('estatico')) {
        setGenProgress('Peça 1 — Estático: replicando template da referência...');
        const scene = (piece.scenes || [])[0] || {};
        const bgImage = scene.driveImageUrl || 'https://lh3.googleusercontent.com/d/13e96WR2Bs95nz8-7K288DFDxPdTcKRp0=s1920';
        const refImage = 'https://lh3.googleusercontent.com/d/13G7xGya7gVAfP_EVTdOxQKoM5TvAU230=s1920';

        // Montar prompt que descreve a referência + dados novos do briefing
        const headline = scene.headline || piece.headline || '';
        const subtitle = scene.subtitle || piece.subtitle || '';
        const cta = scene.cta || piece.cta || 'Saiba mais';
        const dataOverlay = scene.dataOverlay || piece.dataOverlay || '';

        const staticPrompt = `Professional real estate marketing static ad, 9:16 vertical format, EXACT SAME LAYOUT as the reference image: dark blue badge at top with "Lançamento" label, main headline with financial data in center, dark blue data card with bullet points showing investment metrics, coral location pin badge, coral CTA button at bottom. Background: beautiful Brazilian coastal location photo. Clean premium Seazone brand style. Colors: navy #011337, coral #F1605D, white #FFFFFF. Text content to include: "${headline}". Data points: "${dataOverlay}". Location: "${subtitle}". CTA: "${cta}". Modern, clean, editorial real estate design. 8k quality.`;

        if (!canCallAPI()) { setGeneratedImages([...allMedia]); continue; }
        try {
          const res = await fetch('/api/generate-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: staticPrompt,
              engine: 'flux',
              format: '9:16',
              referenceImageUrl: refImage,
              referenceStrength: 0.55,
            }),
          });
          const result = await res.json();
          if (result.url) {
            allMedia.push({
              piece: pn, scene: 1,
              engine: 'flux', type: 'image', url: result.url,
              prompt: staticPrompt,
              headline, subtitle, cta, dataOverlay,
            });
          } else {
            console.error('Estático sem URL:', result);
            setGenProgress(`Peça 1 — Erro: ${result.error || 'Sem URL no resultado'}`);
            allMedia.push({ piece: pn, scene: 1, engine: 'flux', type: 'image', error: result.error || 'Sem URL' });
          }
        } catch (err) {
          console.error('Estático erro:', err);
          setGenProgress(`Peça 1 — Erro: ${err.message}`);
          allMedia.push({ piece: pn, scene: 1, engine: 'flux', type: 'image', error: err.message });
        }
        setGeneratedImages([...allMedia]);
        continue;
      }

      // --- PEÇA 2: NARRADO 15s (Kling + ElevenLabs) ---
      if (pn === 2 || pType.includes('narrado')) {
        // HARDCODED: 3 cenas com imagens do Drive — não depende do diretor criativo
        const NARRADO_SCENES = [
          {
            name: 'Fachada',
            imageUrl: 'https://lh3.googleusercontent.com/d/1gr6pI4ElrZK0gM4pJi-QgHqlVc91-0Nn=s1920',
            prompt: 'Slow cinematic tilt up revealing modern residential building facade, golden hour warm sunlight, clean architectural lines, premium real estate, photorealistic',
          },
          {
            name: 'Rooftop',
            imageUrl: 'https://lh3.googleusercontent.com/d/1rkssZ7grxxozxe8xlKN0LVc0hw4p2vl5=s1920',
            prompt: 'Gentle camera pan across luxury rooftop infinity pool, warm golden hour light reflecting on water, ocean view in background, premium resort atmosphere',
          },
          {
            name: 'Localização',
            imageUrl: 'https://lh3.googleusercontent.com/d/13e96WR2Bs95nz8-7K288DFDxPdTcKRp0=s1920',
            prompt: 'Smooth aerial drone push forward over beautiful Brazilian coastal landscape, turquoise ocean, white sand beach, tropical vegetation, golden hour',
          },
        ];

        // Se o diretor criativo mandou cenas com URLs, usar. Senão, usar hardcoded.
        const dirScenes = (piece.scenes || []).filter(s => s.driveImageUrl && s.videoPrompt);
        const scenesToUse = dirScenes.length >= 2 ? dirScenes.map((s, i) => ({
          name: `Cena ${i + 1}`,
          imageUrl: s.driveImageUrl,
          prompt: s.videoPrompt,
        })) : NARRADO_SCENES;

        // Gerar vídeos animados das cenas
        for (let i = 0; i < scenesToUse.length; i++) {
          const scene = scenesToUse[i];
          if (!canCallAPI()) break;
          setGenProgress(`Peça 2 — Narrado: animando ${scene.name} (${i + 1}/${scenesToUse.length})...`);
          try {
            const res = await fetch('/api/generate-video', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                prompt: scene.prompt,
                engine: 'kling',
                imageUrl: scene.imageUrl,
                format: '9:16',
              }),
            });
            const result = await res.json();
            if (result.url) {
              allMedia.push({
                piece: pn, scene: i + 1,
                engine: 'kling', type: 'video', url: result.url, prompt: scene.prompt,
              });
            } else {
              allMedia.push({ piece: pn, scene: i + 1, engine: 'kling', type: 'video', error: result.error || 'Sem URL' });
            }
          } catch (err) {
            allMedia.push({ piece: pn, scene: i + 1, engine: 'kling', type: 'video', error: err.message });
          }
          setGeneratedImages([...allMedia]);
        }

        // Gerar narração (ElevenLabs) — pegar texto do roteiro
        const dirNarration = (piece.scenes || []).map(s => s.narrationText || s.lettering || '').filter(Boolean).join(' ');
        const narrationText = dirNarration || (roteiroTexts[2] || '').replace(/[━─═]/g, '').replace(/CENA \d+:|Visual:|Movimento:|Lettering:|Narração:|VÍDEO NARRADO.*/g, ' ').trim().substring(0, 500);
        if (narrationText && canCallAPI()) {
          setGenProgress('Peça 2 — Narrado: gerando narração (voz Monica)...');
          try {
            const res = await fetch('/api/generate-audio', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: narrationText }),
            });
            const result = await res.json();
            if (result.audio) {
              allMedia.push({
                piece: pn, scene: 0,
                engine: 'elevenlabs', type: 'audio',
                url: `data:audio/mp3;base64,${result.audio}`,
                prompt: 'Narração voz Monica',
              });
              setGeneratedImages([...allMedia]);
            }
          } catch (err) {
            allMedia.push({ piece: pn, scene: 0, engine: 'elevenlabs', type: 'audio', error: err.message });
          }
        }
        continue;
      }

      // --- PEÇA 3: APRESENTADORA 30s (Veo 3 + Kling) ---
      if (pn === 3 || pType.includes('apresentadora')) {
        // HARDCODED: Monica (Veo 3) + cenas empreendimento (Kling)
        const MONICA_PHOTO = 'https://lh3.googleusercontent.com/d/1fnk4XbJ3vtkrrM5f0RAbTMSTFdOatsC9=s1920';

        // Extrair falas da Monica do roteiro
        const roteiroText = roteiroTexts[3] || '';
        const falas = roteiroText.match(/Monica fala:\s*"([^"]+)"/g) || [];
        const falaTexts = falas.map(f => f.replace(/Monica fala:\s*"/, '').replace(/"$/, ''));
        const monicaFala = falaTexts[0] || 'Oi, eu sou a Monica, sócia fundadora da Seazone. Esse empreendimento entrega resultados reais.';

        const APRESENTADORA_SCENES = [
          {
            name: 'Monica falando',
            engine: 'veo3',
            imageUrl: MONICA_PHOTO,
            prompt: `Medium shot of a Brazilian woman with brown hair speaking directly to camera, warm confident professional tone, modern clean background, golden hour side lighting, speaking in Brazilian Portuguese, she says: "${monicaFala}"`,
            duration: '8s',
            generateAudio: true,
          },
          {
            name: 'Fachada animada',
            engine: 'kling',
            imageUrl: 'https://lh3.googleusercontent.com/d/1gr6pI4ElrZK0gM4pJi-QgHqlVc91-0Nn=s1920',
            prompt: 'Slow cinematic tilt up of modern residential building, golden hour warm light, premium architecture, clean lines',
          },
          {
            name: 'Rooftop animado',
            engine: 'kling',
            imageUrl: 'https://lh3.googleusercontent.com/d/1rkssZ7grxxozxe8xlKN0LVc0hw4p2vl5=s1920',
            prompt: 'Gentle pan across luxury rooftop pool with ocean view, golden hour, warm light on water, premium resort feel',
          },
        ];

        for (let i = 0; i < APRESENTADORA_SCENES.length; i++) {
          if (!canCallAPI()) break;
          const scene = APRESENTADORA_SCENES[i];
          setGenProgress(`Peça 3 — Apresentadora: ${scene.name} (${i + 1}/${APRESENTADORA_SCENES.length})...`);
          try {
            const body = {
              prompt: scene.prompt,
              engine: scene.engine,
              imageUrl: scene.imageUrl,
              format: '9:16',
            };
            if (scene.engine === 'veo3') {
              body.duration = scene.duration || '8s';
              body.generateAudio = scene.generateAudio ?? true;
            }
            const res = await fetch('/api/generate-video', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const result = await res.json();
            if (result.url) {
              allMedia.push({
                piece: pn, scene: i + 1,
                engine: scene.engine, type: 'video', url: result.url, prompt: scene.prompt,
              });
            } else {
              allMedia.push({ piece: pn, scene: i + 1, engine: scene.engine, type: 'video', error: result.error || 'Sem URL' });
            }
          } catch (err) {
            allMedia.push({ piece: pn, scene: i + 1, engine: scene.engine, type: 'video', error: err.message });
          }
          setGeneratedImages([...allMedia]);
        }
        continue;
      }
    }

    setGenProgress(`✅ Concluído — ${apiCallCount} chamadas de API usadas (limite: ${MAX_API_CALLS})`);
    setGenStatus('success');
    setPhase('validation');
    runValidation(allMedia, dir);
  };

  // --- Agent 06: Validate ---
  const runValidation = async (images, dir) => {
    setValStatus('running');
    try {
      const creatives = {
        direction: dir,
        images: images.filter(i => i.url).map(i => ({
          piece: i.piece, scene: i.scene, engine: i.engine, prompt: i.prompt,
        })),
        totalImages: images.filter(i => i.url).length,
        totalErrors: images.filter(i => i.error).length,
      };
      const res = await fetch('/api/validate-creative', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ briefing: data, creatives }),
      });
      const result = await res.json();
      setFinalValidation(result);
      setValStatus('success');
      setPhase('done');
    } catch (err) {
      setValStatus('error');
    }
  };

  return (
    <div className="fade-in">
      <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-6 flex items-center justify-between">
        <p className="text-sm text-emerald-700">✅ Briefing <strong>{projectName}</strong> validado.</p>
        <span className="text-xs font-mono px-2 py-1 rounded-full bg-yellow-100 text-yellow-800">
          {phase === 'done' ? 'Pipeline completo!' : `Fase: ${phase}`}
        </span>
      </div>

      {/* Agent 02+03: Roteiros */}
      <h3 className="font-display font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Agentes 02+03 — Roteiros</h3>
      <div className="space-y-4 mb-6">
        {[1, 2, 3].map(n => (
          <PieceCardWrapper key={n} pieceNumber={n} briefing={data}
            active={activePieces.includes(n)} onStatusChange={handlePieceStatus}
            onComplete={handlePieceComplete} />
        ))}
      </div>

      {/* Agent 04: Direction */}
      {allRoteiros && (
        <div className="mb-6 fade-in">
          <h3 className="font-display font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Agente 04 — Diretor Criativo</h3>
          <AgentCard number="04" name="Diretor Criativo" icon="🎨" status={dirStatus}
            description="Gerando prompts de IA para cada cena..." timer={dirTimer}>
            {direction && (
              <div className="px-5 py-3 bg-emerald-50 text-sm text-emerald-700">
                ✅ {(direction.pieces || []).length} peças com prompts gerados
              </div>
            )}
          </AgentCard>
        </div>
      )}

      {/* Agent 05: Creatives */}
      {phase === 'creatives' || phase === 'validation' || phase === 'done' ? (
        <div className="mb-6 fade-in">
          <h3 className="font-display font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Agente 05 — Executor Criativo</h3>
          <AgentCard number="05" name="Executor Criativo" icon="⚡" status={genStatus}
            description={genProgress || 'Gerando imagens...'} timer={genTimer}>
            {generatedImages.length > 0 && (
              <div className="px-5 py-3">
                {/* Images */}
                <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Imagens</p>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 mb-4">
                  {generatedImages.filter(i => i.url && i.type === 'image').map((img, idx) => (
                    <a key={idx} href={img.url} target="_blank" rel="noopener" className="relative group">
                      <img src={img.url} alt={`P${img.piece} C${img.scene}`}
                        className="w-full aspect-[9/16] object-cover rounded-lg border border-gray-200 hover:border-sea-coral transition-colors" />
                      <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-[10px] px-2 py-1 rounded-b-lg">
                        P{img.piece} C{img.scene} — {img.engine === 'drive' ? 'Drive' : img.engine}
                      </div>
                    </a>
                  ))}
                </div>
                {/* Videos */}
                {generatedImages.some(i => i.url && i.type === 'video') && (
                  <>
                    <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Vídeos</p>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {generatedImages.filter(i => i.url && i.type === 'video').map((vid, idx) => (
                        <div key={idx} className="relative">
                          <video src={vid.url} controls className="w-full rounded-lg border border-gray-200" />
                          <div className="mt-1 text-[10px] text-gray-500">
                            P{vid.piece} C{vid.scene} — {vid.engine === 'kling' ? 'Kling' : vid.engine === 'veo3' ? 'Veo 3 (Monica)' : vid.engine}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
                <p className="text-xs text-gray-500 mt-2">
                  {generatedImages.filter(i => i.url && i.type === 'image').length} imagens +
                  {' '}{generatedImages.filter(i => i.url && i.type === 'video').length} vídeos gerados
                </p>
              </div>
            )}
          </AgentCard>
        </div>
      ) : null}

      {/* Agent 06: Validation */}
      {phase === 'validation' || phase === 'done' ? (
        <div className="mb-6 fade-in">
          <h3 className="font-display font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Agente 06 — Validador Final</h3>
          <AgentCard number="06" name="Validador do Criativo" icon="🏆" status={valStatus}
            description="Validando criativos gerados..." timer={valTimer}>
            {finalValidation && (
              <div className={`px-5 py-3 text-sm ${finalValidation.approved ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
                <strong>{finalValidation.approved ? '✅' : '❌'}</strong> {finalValidation.summary}
                {finalValidation.recommendation && (
                  <p className="mt-1 text-xs opacity-80">{finalValidation.recommendation}</p>
                )}
              </div>
            )}
          </AgentCard>
        </div>
      ) : null}

      {/* Approval per piece */}
      {phase === 'done' && (
        <div className="mt-6 fade-in space-y-4">
          <h3 className="font-display font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider">Aprovação dos Entregáveis</h3>

            const pieceIcons = { 1: '🖼️', 2: '🎥', 3: '🎬' };
            const items = generatedImages.filter(i => i.url && i.piece === pn);
            const errors = generatedImages.filter(i => i.error && i.piece === pn);
            const saved = approvedPieces[pn] || [];
            const isSaving = savingPiece === pn;
            const isApproved = saved.length > 0;

            return (
              <div key={pn} className={`rounded-xl border ${isApproved ? 'border-emerald-300 bg-emerald-50' : 'border-gray-200 bg-white'} p-4`}>

                    <span className="font-bold text-sm">{pieceNames[pn]}</span>

                  </div>
                  {!isApproved && items.length > 0 && (
                    <div className="flex gap-2">
                      <button
                        onClick={() => handleReject(pn)}
                        disabled={regeneratingPiece === pn || isSaving}
                        className="border border-red-300 text-red-600 hover:bg-red-50 disabled:opacity-50 font-bold px-4 py-2 rounded-lg text-xs"
                      >
                        {regeneratingPiece === pn ? 'Refazendo...' : 'Reprovar e Refazer'}
                      </button>
                      <button
                        onClick={() => handleApproveAll(pn)}
                        disabled={isSaving || regeneratingPiece === pn}
                        className="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white font-bold px-4 py-2 rounded-lg text-xs"
                      >
                        {isSaving ? 'Salvando...' : 'Aprovar e Salvar'}
                      </button>
                    </div>
                  )}
                </div>

                {/* Show items */}
                {pn === 1 ? (
                  /* ESTÁTICO: imagem com overlay estilo Seazone + referência lado a lado */
                  <div>
                    <div className="grid grid-cols-2 gap-4">
                      {/* Gerado — imagem do Drive com template Seazone */}
                      <div>
                        <p className="text-[10px] font-bold text-gray-500 mb-1 uppercase">Gerado</p>
                        {items.map((item, idx) => (
                          <div key={idx} className="relative rounded-lg overflow-hidden border border-gray-200" style={{aspectRatio: '9/16'}}>
                            <img src={item.url} alt="" className="w-full h-full object-cover" />
                            {/* Overlay Seazone — copiando hierarquia da referência */}
                            <div className="absolute inset-0 flex flex-col justify-between p-3" style={{background: 'linear-gradient(180deg, rgba(1,19,55,0.75) 0%, rgba(1,19,55,0.15) 35%, rgba(1,19,55,0.1) 55%, rgba(1,19,55,0.8) 100%)'}}>

                              {/* TOPO — Badge lançamento + Logo */}
                              <div className="space-y-2">
                                <div className="flex items-center justify-between">
                                  <span className="text-white/90 text-[7px] font-bold uppercase tracking-widest">Seazone</span>
                                  <span className="text-[7px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider" style={{backgroundColor: '#F1605D', color: 'white'}}>
                                    Lançamento
                                  </span>
                                </div>
                                {item.headline && (
                                  <p className="font-display font-bold text-white text-base leading-snug drop-shadow-lg">
                                    {item.headline}
                                  </p>
                                )}
                              </div>

                              {/* CENTRO — Caixa de dados (estilo referência) */}
                              <div className="space-y-2">
                                {/* Caixa azul ROI */}
                                {item.dataOverlay && (
                                  <div className="rounded-lg p-2.5 space-y-1.5" style={{backgroundColor: 'rgba(1,19,55,0.85)', backdropFilter: 'blur(8px)'}}>
                                    {item.dataOverlay.split(',').map((dado, i) => (
                                      <div key={i} className="flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{backgroundColor: '#F1605D'}}></span>
                                        <span className="text-white text-[9px] font-medium">{dado.trim()}</span>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                {/* Pin de localização */}
                                {item.subtitle && (
                                  <div className="flex items-center gap-1.5 bg-white/15 backdrop-blur-sm rounded-full px-2.5 py-1 w-fit">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="#F1605D"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
                                    <span className="text-white text-[8px] font-medium">{item.subtitle}</span>
                                  </div>
                                )}
                              </div>

                              {/* BASE — CTA */}
                              <div className="text-center">
                                {item.cta ? (
                                  <span className="inline-block text-white font-bold text-[9px] px-5 py-1.5 rounded-full shadow-lg" style={{backgroundColor: '#F1605D'}}>
                                    {item.cta}
                                  </span>
                                ) : (
                                  <span className="inline-block text-white font-bold text-[9px] px-5 py-1.5 rounded-full shadow-lg" style={{backgroundColor: '#F1605D'}}>
                                    Saiba mais
                                  </span>
                                )}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                      {/* Referência — Estático.png do Drive */}
                      <div>
                        <p className="text-[10px] font-bold text-gray-500 mb-1 uppercase">Referência (copiar hierarquia)</p>
                        <div className="rounded-lg overflow-hidden border-2 border-dashed border-orange-300">
                          <img
                            src="https://lh3.googleusercontent.com/d/13G7xGya7gVAfP_EVTdOxQKoM5TvAU230=s1920"
                            alt="Referência estático"
                            className="w-full h-auto"
                          />
                        </div>
                        <p className="text-[10px] text-orange-600 mt-1">Copiar: layout, posição dos elementos, caixas, ícones, hierarquia de texto</p>
                      </div>
                    </div>
                  </div>
                ) : (
                  /* VÍDEOS e ÁUDIO: exibição normal */
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    {items.map((item, idx) => (
                      <div key={idx} className="relative">
                        {item.type === 'video' ? (
                          <video src={item.url} controls className="w-full rounded-lg border border-gray-200" />
                        ) : item.type === 'audio' ? (
                          <audio src={item.url} controls className="w-full" />
                        ) : (
                          <img src={item.url} alt="" className="w-full aspect-[9/16] object-cover rounded-lg border border-gray-200" />
                        )}
                        <div className="mt-1 text-[10px] text-gray-500">
                          C{item.scene} — {item.engine}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Show errors */}
                {errors.length > 0 && (
                  <div className="mt-2 space-y-1">
                    {errors.map((e, idx) => (
                      <p key={idx} className="text-xs text-red-600 bg-red-50 px-2 py-1 rounded">
                        Erro cena {e.scene}: {e.error}
                      </p>
                    ))}

                )}

                {/* Show saved URLs */}
                {saved.length > 0 && (
                  <div className="mt-2 space-y-1">
                    {saved.map((s, idx) => (
                      <a key={idx} href={s.savedUrl} target="_blank" rel="noopener"
                        className="block text-xs text-emerald-700 hover:underline truncate">
                        Salvo: {s.savedUrl}
                      </a>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          {/* All approved */}
          {Object.keys(approvedPieces).length === 3 && (
            <div className="bg-sea-dark rounded-xl p-6 text-white text-center">
              <div className="text-4xl mb-3">🎉</div>
              <h3 className="font-display font-bold text-xl mb-2">Pacote completo e salvo!</h3>
              <p className="text-white/60 text-sm mb-4">{projectName} — 3/3 peças aprovadas</p>
              <button onClick={onReset} className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-2.5 rounded-lg text-sm">
                Novo Briefing
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Wrapper to observe status changes — with auto-fix on rejection (max 2 retries)
function PieceCardWrapper({ pieceNumber, briefing, active, onStatusChange, onComplete }) {
  const [status, setStatus] = useState('idle');
  const [text, setText] = useState('');
  const [validation, setValidation] = useState(null);
  const [error, setError] = useState(null);
  const [startTime, setStartTime] = useState(null);
  const [endTime, setEndTime] = useState(null);
  const [expanded, setExpanded] = useState(true);
  const [attempt, setAttempt] = useState(0);
  const [history, setHistory] = useState([]); // previous attempts
  const textRef = useRef('');
  const started = useRef(false);
  const containerRef = useRef(null);
  const MAX_RETRIES = 2;

  const elapsed = useTimer(status === 'generating' || status === 'validating' || status === 'fixing');

  useEffect(() => {
    if (active && !started.current) {
      started.current = true;
      runPiece();
    }
  }, [active]);

  useEffect(() => {
    if (status === 'approved' || status === 'error') {
      onStatusChange(pieceNumber, status);
      if (status === 'approved' && onComplete) {
        onComplete(pieceNumber, textRef.current);
      }
    }
  }, [status]);

  const streamGenerate = (fn, args) => {
    return new Promise((resolve) => {
      textRef.current = '';
      setText('');
      fn(
        ...args,
        (chunk) => {
          textRef.current += chunk;
          setText(textRef.current);
          if (containerRef.current) containerRef.current.scrollTop = containerRef.current.scrollHeight;
        },
        () => resolve(true),
        (err) => { setError(err); setStatus('error'); resolve(false); }
      );
    });
  };

  const runPiece = async () => {
    setStatus('generating');
    setStartTime(Date.now());
    setAttempt(1);

    const ok = await streamGenerate(generatePiece, [briefing, pieceNumber]);
    if (!ok || !textRef.current) return;

    // Validate
    setStatus('validating');
    let result = await validatePiece(briefing, textRef.current, pieceNumber);
    setValidation(result);

    if (result.approved) {
      setStatus('approved');
      setEndTime(Date.now());
      return;
    }

    // Auto-fix loop (max retries)
    for (let retry = 1; retry <= MAX_RETRIES; retry++) {
      // Save previous attempt to history
      setHistory(prev => [...prev, { text: textRef.current, validation: result, attempt: retry }]);
      setAttempt(retry + 1);
      setStatus('fixing');
      setValidation(null);

      const errors = result.errors || [result.summary || 'Peça reprovada'];
      const prevText = textRef.current;

      const fixOk = await streamGenerate(fixPiece, [briefing, prevText, errors, pieceNumber]);
      if (!fixOk || !textRef.current) return;

      // Re-validate
      setStatus('validating');
      result = await validatePiece(briefing, textRef.current, pieceNumber);
      setValidation(result);

      if (result.approved) {
        setStatus('approved');
        setEndTime(Date.now());
        return;
      }
    }

    // Exceeded retries — approve anyway to continue pipeline
    setStatus('approved');
    setEndTime(Date.now());
    setValidation({ ...result, approved: true, summary: `Aprovado após ${MAX_RETRIES + 1} tentativas (última versão usada). ${result.summary || ''}` });
  };

  const totalTime = endTime && startTime ? endTime - startTime : elapsed;
  const name = PIECE_NAMES[pieceNumber - 1];
  const icon = PIECE_ICONS[pieceNumber - 1];

  const statusColors = {
    idle: 'border-gray-200 opacity-60',
    generating: 'border-sea-coral shadow-md',
    validating: 'border-yellow-300 shadow-md',
    fixing: 'border-orange-300 shadow-md',
    approved: 'border-emerald-300',
    rejected: 'border-red-300',
    error: 'border-red-300',
  };
  const statusBadge = {
    idle: { bg: 'bg-gray-100 text-gray-400', label: 'Aguardando' },
    generating: { bg: 'bg-sea-coral/10 text-sea-coral', label: 'Gerando...' },
    validating: { bg: 'bg-yellow-100 text-yellow-700', label: 'Validando...' },
    fixing: { bg: 'bg-orange-100 text-orange-700', label: `Corrigindo (tentativa ${attempt})...` },
    approved: { bg: 'bg-emerald-100 text-emerald-700', label: 'Aprovado' },
    rejected: { bg: 'bg-red-100 text-red-700', label: 'Reprovado' },
    error: { bg: 'bg-red-100 text-red-700', label: 'Erro' },
  };
  const badge = statusBadge[status];

  return (
    <div className={`bg-white rounded-xl border-2 overflow-hidden transition-all fade-in ${statusColors[status]}`}>
      <div className="flex items-center gap-3 px-5 py-4 cursor-pointer" onClick={() => text && setExpanded(!expanded)}>
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0
          ${status === 'approved' ? 'bg-emerald-100' : status === 'generating' || status === 'fixing' ? 'bg-sea-coral/10' : 'bg-gray-100'}`}>
          {status === 'approved' ? '✓' : icon}
        </div>
        <div className="flex-1">
          <div className="flex items-center gap-2">
            <span className="text-[10px] font-mono bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">#{pieceNumber}</span>
            <h3 className="font-display font-bold">{name}</h3>
            {attempt > 1 && <span className="text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded">tentativa {attempt}</span>}
          </div>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {totalTime > 0 && (
            <span className={`text-xs font-mono px-2 py-1 rounded-full ${
              totalTime > 600000 ? 'bg-red-100 text-red-700' : totalTime > 300000 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600'
            }`}>{formatTimer(totalTime)}</span>
          )}
          <span className={`text-xs font-medium px-3 py-1 rounded-full ${badge.bg}`}>
            {(status === 'generating' || status === 'validating' || status === 'fixing') && <span className="inline-block w-2 h-2 bg-current rounded-full mr-1.5 pulse" />}
            {badge.label}
          </span>
          {text && <span className="text-gray-400 text-sm">{expanded ? '▼' : '▶'}</span>}
        </div>
      </div>

      {expanded && text && (
        <div ref={containerRef} className="border-t border-gray-100 px-5 py-4 max-h-96 overflow-y-auto bg-gray-50">
          <div className="roteiro-text text-gray-800">{text}</div>
          {(status === 'generating' || status === 'fixing') && <span className="inline-block w-2 h-4 bg-sea-coral animate-pulse ml-0.5" />}
        </div>
      )}

      {/* Previous attempts */}
      {history.length > 0 && expanded && (
        <div className="border-t px-5 py-3 bg-orange-50">
          <p className="text-xs font-bold text-orange-700 mb-1">Tentativas anteriores:</p>
          {history.map((h, i) => (
            <div key={i} className="text-xs text-orange-600 mb-1">
              Tentativa {h.attempt}: {h.validation?.summary || 'Reprovado'}
            </div>
          ))}
        </div>
      )}

      {validation && expanded && (
        <div className={`border-t px-5 py-3 text-sm ${validation.approved ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
          <strong>{validation.approved ? '✅' : '❌'}</strong> {validation.summary}
          {validation.errors && validation.errors.length > 0 && (
            <ul className="mt-2 space-y-1">{validation.errors.map((e, i) => <li key={i} className="text-xs">• {e}</li>)}</ul>
          )}
        </div>
      )}

      {error && (
        <div className="border-t px-5 py-3 bg-red-50 text-sm text-red-700"><strong>Erro:</strong> {error}</div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [step, setStep] = useState(1);
  const [briefingData, setBriefingData] = useState(null);
  const [briefingUrl, setBriefingUrl] = useState('');

  const STEPS = ['Briefing', 'Validação', 'Roteiros'];

  return (
    <div className="min-h-screen bg-gray-50">
      <Header />
      <div className="max-w-4xl mx-auto px-4 py-6">
        <div className="mb-6">
          <StepIndicator steps={STEPS} currentStep={step - 1} />
        </div>
        {step === 1 && <Step1_Input onSubmit={(data, url) => { setBriefingData(data); setBriefingUrl(url); setStep(2); }} />}
        {step === 2 && <Step2_Validation data={briefingData} url={briefingUrl}
          onApproved={() => setStep(3)}
          onReset={() => { setStep(1); setBriefingData(null); }} />}
        {step === 3 && <Step3_Pipeline data={briefingData}
          onReset={() => { setStep(1); setBriefingData(null); }} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
