function formatTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min > 0) return `${min}m ${sec.toString().padStart(2, '0')}s`;
  return `${sec}s`;
}

function useTimer(running) {
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(null);
  useEffect(() => {
    if (running) {
      startRef.current = Date.now();
      const iv = setInterval(() => setElapsed(Date.now() - startRef.current), 500);
      return () => clearInterval(iv);
    }
  }, [running]);
  return elapsed;
}

async function generatePieceStream(briefing, pieceNumber, onChunk, onDone, onError) {
  const MAX_RETRIES = 2;
  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try {
      const res = await fetch('/api/generate-roteiro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ briefing, pieceNumber }),
      });
      if (!res.ok) {
        if (res.status >= 500 && attempt < MAX_RETRIES - 1) { await new Promise(r => setTimeout(r, 3000)); continue; }
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        onError(err.error || `HTTP ${res.status}`); return;
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let receivedData = false;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.done) { onDone(); return; }
              if (data.error) { onError(data.error); return; }
              if (data.text) { onChunk(data.text); receivedData = true; }
            } catch {}
          }
        }
      }
      if (receivedData) { onDone(); return; }
      if (attempt < MAX_RETRIES - 1) { await new Promise(r => setTimeout(r, 3000)); continue; }
      onError('Roteiro vazio — OpenRouter nao retornou conteudo'); return;
    } catch (err) {
      if (attempt < MAX_RETRIES - 1) { await new Promise(r => setTimeout(r, 3000)); continue; }
      onError(err.message || 'Erro de conexao');
    }
  }
}

async function safeFetchOnce(url, options) {
  try {
    const res = await fetch(url, options);
    const text = await res.text();
    try { return JSON.parse(text); }
    catch { return { error: `Resposta invalida: ${text.substring(0, 150)}` }; }
  } catch (e) { return { error: e.message }; }
}

async function generateVideo(body) {
  const r = await safeFetchOnce('/api/generate-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (r.url) return r;
  if (r.error) return r;
  if (r.requestId && r.statusUrl && r.responseUrl) {
    const maxWait = 720000;
    const start = Date.now();
    while (Date.now() - start < maxWait) {
      await new Promise(res => setTimeout(res, 8000));
      const poll = await safeFetchOnce(`/api/poll-video?statusUrl=${encodeURIComponent(r.statusUrl)}&responseUrl=${encodeURIComponent(r.responseUrl)}`, {});
      if (poll.url) return poll;
      if (poll.status === 'failed') return { error: poll.error || 'Video falhou no fal.ai' };
    }
    return { error: 'Timeout aguardando video (12min)' };
  }
  return r;
}

async function pollCreatomateRender(renderId, onProgress, maxMinutes = 10) {
  const maxAttempts = maxMinutes * 12;
  for (let i = 0; i < maxAttempts; i++) {
    await new Promise(r => setTimeout(r, 5000));
    try {
      const res = await fetch(`/api/poll-render?id=${renderId}`);
      const data = await res.json();
      if (data.status === 'completed' && data.url) return data.url;
      if (data.status === 'failed') { onProgress && onProgress(`Erro: ${data.error || 'render falhou'}`); return null; }
      onProgress && onProgress(`montando... (${Math.floor((i + 1) * 5 / 60)}min ${((i + 1) * 5) % 60}s)`);
    } catch (e) { /* retry */ }
  }
  onProgress && onProgress('Timeout — render nao finalizou');
  return null;
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}

function validateBriefing(data) {
  const results = [];
  let allPassed = true;
  for (const section of REQUIRED_SECTIONS) {
    const sectionData = data[section.key];
    const fieldResults = [];
    let sectionPassed = true;
    if (!sectionData) {
      results.push({ key: section.key, label: section.label, passed: false, error: 'Secao ausente', fields: [] });
      allPassed = false; continue;
    }
    for (const field of section.fields) {
      const value = getNestedValue(sectionData, field.path);
      let passed = true, error = null;
      if (field.isArray) {
        if (!Array.isArray(value) || value.length < (field.minItems || 1)) { passed = false; error = 'Array vazio'; }
      } else if (field.isObject) {
        if (!value || typeof value !== 'object' || Object.keys(value).length === 0) { passed = false; error = 'Objeto ausente'; }
      } else {
        if (value === undefined || value === null || value === '') { passed = false; error = 'Ausente'; }
      }
      if (!passed) sectionPassed = false;
      const displayValue = field.isArray ? (Array.isArray(value) ? `${value.length} item(ns)` : null) :
                           field.isObject ? (value ? `${Object.keys(value).length} campo(s)` : null) : value;
      fieldResults.push({ path: field.path, label: field.label, passed, error, value: displayValue });
    }
    if (!sectionPassed) allPassed = false;
    results.push({ key: section.key, label: section.label, passed: sectionPassed, fields: fieldResults });
  }
  return { allPassed, results };
}

const initialState = {
  page: 'home',
  briefingData: null,
  briefingUrl: '',

};

function appReducer(state, action) {
  switch (action.type) {
    case 'NAVIGATE': return { ...state, page: action.page };
    case 'SET_BRIEFING': return { ...state, briefingData: action.data, briefingUrl: action.url };
    case 'SET_ROTEIRO': return { ...state, roteiroTexts: { ...state.roteiroTexts, [action.piece]: action.text } };
    case 'SET_ALL_ROTEIROS': return { ...state, roteiroTexts: action.texts };
    case 'SET_CURRENT_PIECE': return { ...state, currentPiece: action.piece };
    case 'SET_RESULTS': return { ...state, results: { ...state.results, [action.piece]: action.items } };
    case 'SET_ERRORS': return { ...state, pieceErrors: { ...state.pieceErrors, [action.piece]: action.errors } };
    case 'APPROVE_PIECE': return { ...state, approvedPieces: { ...state.approvedPieces, [action.piece]: action.item } };
    case 'CLEAR_PIECE': return { ...state, results: { ...state.results, [action.piece]: [] }, pieceErrors: { ...state.pieceErrors, [action.piece]: [] } };
    case 'ADD_CHAT': {
      const agent = action.agent;
      const prev = state.chatMessages[agent] || [];
      return { ...state, chatMessages: { ...state.chatMessages, [agent]: [...prev, { text: action.text, type: action.msgType || 'info', time: Date.now() }] } };
    }
    case 'CLEAR_CHAT': return { ...state, chatMessages: { ...state.chatMessages, [action.agent]: [] } };
    case 'RESET': return { ...initialState };
    default: return state;
  }
}

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao buscar briefing');

      dispatch({ type: 'SET_BRIEFING', data, url: url.trim() });
      dispatch({ type: 'ADD_CHAT', agent: 'agent01', text: 'Briefing recebido! Validando campos...', msgType: 'info' });

      const result = validateBriefing(data);
      setValidation(result);

      if (result.allPassed) {
        dispatch({ type: 'ADD_CHAT', agent: 'agent01', text: `Briefing "${data.projeto?.nome || 'Empreendimento'}" validado com sucesso! Todas as ${result.results.length} secoes completas. Pode seguir!`, msgType: 'success' });
      } else {
        const failed = result.results.filter(r => !r.passed).map(r => r.label);
        dispatch({ type: 'ADD_CHAT', agent: 'agent01', text: `Briefing incompleto. Secoes com problema: ${failed.join(', ')}. Corrija no Lovable e tente novamente.`, msgType: 'error' });
      }
    } catch (err) {
      setError(err.message);
      dispatch({ type: 'ADD_CHAT', agent: 'agent01', text: `Erro: ${err.message}`, msgType: 'error' });
    } finally {
      setLoading(false);
    }
  };

  return (
    <AgentPageLayout num="01" role="Analista de Briefing" icon="📋" chatMessages={msgs}>
      {/* URL Input */}
      <div className="bg-white rounded-xl border border-gray-200 p-6 mb-4">
        <h3 className="font-display font-bold text-sm mb-3">Cole a URL do Lovable</h3>
        <div className="flex gap-2">
          <input type="url" value={url} onChange={e => setUrl(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="https://nomedoempreendimento.lovable.app"
            className="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-sea-coral focus:ring-2 focus:ring-sea-coral/20" />
          <button onClick={handleSubmit} disabled={loading || !url.trim()}
            className="bg-sea-coral hover:bg-sea-coral/90 disabled:bg-gray-300 text-white font-bold px-6 py-3 rounded-lg text-sm transition-colors">
            {loading ? 'Buscando...' : 'Validar'}
          </button>
        </div>
        {error && <div className="mt-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700">{error}</div>}
      </div>

      {/* Validation Results */}
      {validation && (
        <div className="space-y-3 mb-4 fade-in">
          {validation.results.map(section => (
            <div key={section.key} className={`bg-white rounded-xl border overflow-hidden ${section.passed ? 'border-emerald-200' : 'border-red-200'}`}>
              <div className={`flex items-center gap-3 px-4 py-3 ${section.passed ? 'bg-emerald-50' : 'bg-red-50'}`}>
                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${section.passed ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                  {section.passed ? '✓' : '✕'}
                </div>
                <span className="font-display font-bold text-sm">{section.label}</span>
                {!section.passed && section.error && <span className="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full ml-auto">{section.error}</span>}
              </div>
              {section.fields.length > 0 && (
                <div className="divide-y divide-gray-100">
                  {section.fields.map(f => (
                    <div key={f.path} className={`flex items-center justify-between px-4 py-2.5 ${f.passed ? '' : 'bg-red-50/50'}`}>
                      <div className="flex items-center gap-2">
                        <span className={`text-sm ${f.passed ? 'text-emerald-500' : 'text-red-500'}`}>{f.passed ? '✓' : '✕'}</span>
                        <span className="text-sm text-gray-700">{f.label}</span>
                      </div>
                      {f.passed && f.value ? (
                        <span className="text-sm font-medium text-gray-900 bg-emerald-50 px-2 py-0.5 rounded">
                          {typeof f.value === 'string' && f.value.length > 50 ? f.value.substring(0, 50) + '...' : f.value}
                        </span>
                      ) : !f.passed ? (
                        <span className="text-xs font-medium text-red-600 bg-red-100 px-2 py-0.5 rounded">{f.error}</span>
                      ) : null}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Actions */}
      {validation && validation.allPassed && (
        <div className="flex justify-end fade-in">
          <button onClick={() => dispatch({ type: 'NAVIGATE', page: 'agent02' })}
            className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-3 rounded-lg text-sm">
            Continuar para Roteiros →
          </button>
        </div>
      )}
    </AgentPageLayout>
  );
}

// AGENT 02 — ROTEIRISTA CRIATIVO (+ Agent 03 behind the scenes)
// ============================================================

function Agent02({ state, dispatch }) {
  const [pieces, setPieces] = useState({ 1: { status: 'idle', text: '', validation: null, attempt: 0 }, 2: { status: 'idle', text: '', validation: null, attempt: 0 }, 3: { status: 'idle', text: '', validation: null, attempt: 0 } });
  const [currentPiece, setCurrentPiece] = useState(0);
  const [allDone, setAllDone] = useState(false);
  const textRefs = useRef({ 1: '', 2: '', 3: '' });
  const started = useRef(false);
  const containerRefs = useRef({});
  const msgs = state.chatMessages['agent02'] || [];

  const updatePiece = (num, updates) => setPieces(prev => ({ ...prev, [num]: { ...prev[num], ...updates } }));

  const streamHelper = (fn, args) => {
    return new Promise((resolve) => {
      fn(...args,
        (chunk) => {
          const num = args[1] || args[3]; // pieceNumber
          textRefs.current[num] = (textRefs.current[num] || '') + chunk;
          updatePiece(num, { text: textRefs.current[num] });
          if (containerRefs.current[num]) containerRefs.current[num].scrollTop = containerRefs.current[num].scrollHeight;
        },
        () => resolve(true),
        (err) => { resolve(false); }
      );
    });
  };

  const runSinglePiece = async (num) => {
    const MAX_RETRIES = 2;
    setCurrentPiece(num);
    updatePiece(num, { status: 'generating', attempt: 1 });
    textRefs.current[num] = '';
    dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Escrevendo roteiro da ${PIECE_NAMES[num]}...`, msgType: 'progress' });

    const ok = await new Promise((resolve) => {
      generatePieceStream(state.briefingData, num,
        (chunk) => { textRefs.current[num] += chunk; updatePiece(num, { text: textRefs.current[num] }); },
        () => resolve(true),
        (err) => { updatePiece(num, { status: 'error', text: err }); resolve(false); }
      );
    });

    if (!ok || !textRefs.current[num]) {
      dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Erro ao gerar roteiro da ${PIECE_NAMES[num]}.`, msgType: 'error' });
      return false;
    }

    // Validate (Agent 03)
    updatePiece(num, { status: 'validating' });
    dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Agente 03 validando roteiro da ${PIECE_NAMES[num]}...`, msgType: 'info' });
    let result = await validatePiece(state.briefingData, textRefs.current[num], num);
    updatePiece(num, { validation: result });

    if (result.approved) {
      updatePiece(num, { status: 'approved' });
      dispatch({ type: 'SET_ROTEIRO', piece: num, text: textRefs.current[num] });
      dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Roteiro da ${PIECE_NAMES[num]} aprovado pelo Agente 03!`, msgType: 'success' });
      return true;
    }

    // Auto-fix loop
    for (let retry = 1; retry <= MAX_RETRIES; retry++) {
      updatePiece(num, { status: 'fixing', attempt: retry + 1 });
      dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Agente 03 encontrou problemas. Corrigindo (tentativa ${retry + 1})...`, msgType: 'warning' });

      const errors = result.errors || [result.summary || 'Peca reprovada'];
      const prevText = textRefs.current[num];
      textRefs.current[num] = '';

      const fixOk = await new Promise((resolve) => {
        fixPieceStream(state.briefingData, prevText, errors, num,
          (chunk) => { textRefs.current[num] += chunk; updatePiece(num, { text: textRefs.current[num] }); },
          () => resolve(true),
          (err) => { resolve(false); }
        );
      });

      if (!fixOk || !textRefs.current[num]) {
        textRefs.current[num] = prevText;
        updatePiece(num, { status: 'approved', text: prevText, validation: { approved: true, summary: 'Aprovado com ressalvas.' } });
        dispatch({ type: 'SET_ROTEIRO', piece: num, text: prevText });
        dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Correcao falhou. Roteiro da ${PIECE_NAMES[num]} aprovado com ressalvas.`, msgType: 'warning' });
        return true;
      }

      updatePiece(num, { status: 'validating' });
      result = await validatePiece(state.briefingData, textRefs.current[num], num);
      updatePiece(num, { validation: result });

      if (result.approved) {
        updatePiece(num, { status: 'approved' });
        dispatch({ type: 'SET_ROTEIRO', piece: num, text: textRefs.current[num] });
        dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Roteiro da ${PIECE_NAMES[num]} aprovado pelo Agente 03!`, msgType: 'success' });
        return true;
      }
    }

    // Exceeded retries
    updatePiece(num, { status: 'approved', validation: { ...result, approved: true, summary: `Aprovado apos ${MAX_RETRIES + 1} tentativas. ${result.summary || ''}` } });
    dispatch({ type: 'SET_ROTEIRO', piece: num, text: textRefs.current[num] });
    dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: `Roteiro da ${PIECE_NAMES[num]} aprovado apos multiplas tentativas.`, msgType: 'warning' });
    return true;
  };

  useEffect(() => {
    if (!started.current && state.briefingData) {
      started.current = true;
      (async () => {
        for (const num of [1, 2, 3]) {
          await runSinglePiece(num);
        }
        setAllDone(true);
        dispatch({ type: 'ADD_CHAT', agent: 'agent02', text: 'Todos os 3 roteiros prontos! Pode seguir para a geracao de criativos.', msgType: 'success' });
      })();
    }
  }, []);

  const elapsed = useTimer(!allDone && started.current);

  const statusColors = {
    idle: 'border-gray-200 opacity-60', generating: 'border-sea-coral shadow-md', validating: 'border-yellow-300 shadow-md',
    fixing: 'border-orange-300 shadow-md', approved: 'border-emerald-300', error: 'border-red-300',
  };
  const statusLabels = {
    idle: 'Aguardando', generating: 'Gerando...', validating: 'Agente 03 validando...', fixing: 'Corrigindo...', approved: 'Aprovado', error: 'Erro',
  };

  return (
    <AgentPageLayout num="02" role="Roteirista Criativo" icon="✍️" chatMessages={msgs}>
      {!allDone && elapsed > 0 && (
        <div className="text-right mb-2">
          <span className="text-xs font-mono bg-gray-100 text-gray-600 px-2 py-1 rounded-full">{formatTimer(elapsed)}</span>
        </div>
      )}

      <div className="space-y-4 mb-4">
        {[1, 2, 3].map(num => {
          const p = pieces[num];
          const [expanded, setExpanded] = useState(num === currentPiece);

          return (
            <div key={num} className={`bg-white rounded-xl border-2 overflow-hidden transition-all ${statusColors[p.status]}`}>
              <div className="flex items-center gap-3 px-5 py-4 cursor-pointer" onClick={() => p.text && setExpanded(!expanded)}>
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0
                  ${p.status === 'approved' ? 'bg-emerald-100' : p.status === 'generating' || p.status === 'fixing' ? 'bg-sea-coral/10' : 'bg-gray-100'}`}>
                  {p.status === 'approved' ? '✓' : PIECE_ICONS[num]}
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-mono bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">#{num}</span>
                    <h3 className="font-display font-bold">{PIECE_NAMES[num]}</h3>
                    {p.attempt > 1 && <span className="text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded">tentativa {p.attempt}</span>}
                  </div>
                </div>
                <span className={`text-xs font-medium px-3 py-1 rounded-full
                  ${p.status === 'approved' ? 'bg-emerald-100 text-emerald-700' :
                    p.status === 'error' ? 'bg-red-100 text-red-700' :
                    p.status === 'idle' ? 'bg-gray-100 text-gray-400' :
                    'bg-sea-coral/10 text-sea-coral'}`}>
                  {(p.status === 'generating' || p.status === 'validating' || p.status === 'fixing') && <span className="inline-block w-2 h-2 bg-current rounded-full mr-1.5 pulse" />}
                  {statusLabels[p.status]}
                </span>
              </div>

              {expanded && p.text && (
                <div ref={el => containerRefs.current[num] = el} className="border-t border-gray-100 px-5 py-4 max-h-80 overflow-y-auto bg-gray-50">
                  <div className="roteiro-text text-gray-800">{p.text}</div>
                  {(p.status === 'generating' || p.status === 'fixing') && <span className="inline-block w-2 h-4 bg-sea-coral animate-pulse ml-0.5" />}
                </div>
              )}

              {p.validation && expanded && (
                <div className={`border-t px-5 py-3 text-sm ${p.validation.approved ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
                  <strong>{p.validation.approved ? '✅' : '❌'}</strong> {p.validation.summary}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {allDone && (
        <div className="flex justify-end fade-in">
          <button onClick={() => { dispatch({ type: 'SET_CURRENT_PIECE', piece: 1 }); dispatch({ type: 'NAVIGATE', page: 'agent04' }); }}
            className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-3 rounded-lg text-sm">
            Continuar para Geracao →
          </button>
        </div>
      )}
    </AgentPageLayout>
  );
}

// AGENT 04 — DIRETOR DE ARTE (static image)

function Agent04({ state, dispatch }) {
  const [status, setStatus] = useState('idle');
  const [progress, setProgress] = useState('');
  const started = useRef(false);
  const msgs = state.chatMessages['agent04'] || [];
  const elapsed = useTimer(status === 'running');

  const generateStatic = async () => {
    setStatus('running');
    dispatch({ type: 'CLEAR_CHAT', agent: 'agent04' });
    dispatch({ type: 'ADD_CHAT', agent: 'agent04', text: 'Iniciando geracao da peca estatica...', msgType: 'progress' });

    const roteiro = state.roteiroTexts[1] || '';
    const vers = [];
    const errs = [];

    const campo = (n, fallback) => {
      const re = new RegExp(`CAMPO ${n}[^:]*:\\s*(.+)`, 'i');
      return (roteiro.match(re) || [])[1]?.trim() || fallback;
    };
    const nomeSpot = campo(1, 'NOVO CAMPECHE SPOT II');
    const badgeDistancia = campo(2, 'Lancamento a 200 m da Praia do Campeche');
    const pinCidade = campo(3, 'Florianopolis/SC');
    const headline = campo(4, 'Para investidores que buscam renda passiva com Airbnb').replace(/\*\*/g, '');
    const labelDado = campo(5, 'Previsao de renda futura').replace(/\*\*/g, '');
    const dadoPrincipal = campo(6, 'de 19,8% liquidos ao ano').replace(/\*\*/g, '');
    const complemento = campo(7, 'com aluguel por temporada');

    for (let v = 1; v <= 2; v++) {
      setProgress(`Gerando versao ${v}/2 via GPT-5 Image...`);
      dispatch({ type: 'ADD_CHAT', agent: 'agent04', text: `Gerando versao ${v} via GPT-5 Image...`, msgType: 'progress' });

      const prompt = `You are a graphic designer. Generate a real estate marketing poster in 4:5 format (1080x1350px).

CRITICAL: You MUST replicate the EXACT layout of the second image (reference). Copy the same fonts, colors, spacing, element sizes and EXACT POSITIONS. The ONLY things that change are the background photo (use the first image) and the text content (listed below).

EXACT LAYOUT (top to bottom) — every element MUST be in the SAME POSITION as the reference:
1. BACKGROUND: Use the first image as full-bleed background (1080x1350). Apply a dark navy gradient overlay on the bottom 50% (fading from transparent to #011337).
2. TOP CENTER: White "seazone" logo with the orange pin icon replacing the "a". SAME position as reference.
3. BELOW LOGO: Red/coral location pin badge with white text "${nomeSpot}" in bold caps. THIS IS A LOCATION PIN — it marks where the property is on the image. It MUST stay in the EXACT SAME POSITION as the reference (do NOT move it). Same style as "NATAL SPOT" in reference.
4. RIGHT SIDE (mid-top): White rounded card with text "${badgeDistancia}" and a small red map pin icon. SAME position as reference.
5. LEFT SIDE (middle): Small coral map pin icon + "${pinCidade}" in white text. SAME position as reference.
6. LEFT SIDE (below pin): Coral/red rectangle badge with white bold text "LANCAMENTO" — SAME position as reference.
7. RIGHT OF BADGE: White text "${headline}" — key words in BOLD white, rest in regular weight. SAME position and font size as reference.
8. BOTTOM SECTION - LEFT: White text "${labelDado}" — key words in BOLD. SAME position as reference.
9. BOTTOM SECTION - RIGHT: Dark navy rounded rectangle card containing "${dadoPrincipal}" — the percentage number must be VERY LARGE (biggest text on the poster), white bold. SAME card style and position as reference.
10. BELOW CARD: White text "${complemento}" — smaller, centered under the card.
11. VERY BOTTOM: Tiny light gray disclaimer text (legal fine print, barely readable).

COLOR PALETTE (exact):
- Navy: #011337 (gradient, cards)
- Coral/Red: #F1605D (badges, pins, accents)
- White: #FFFFFF (text, logo)

ABSOLUTE RULES:
- Output size MUST be exactly 1080x1350 pixels (4:5 feed format)
- Copy the reference layout EXACTLY — same positions, same sizes, same fonts, same spacing
- The orange/coral pin with "${nomeSpot}" (item 3) is a LOCATION MARKER — do NOT move it from its reference position
- Do NOT add any extra text, bullets, icons, or elements that are not in the reference
- Do NOT rearrange or reposition ANY element — every element stays where it is in the reference
- The poster must have EXACTLY 10 text elements as described above, NO MORE
- The big number in the navy card (item 9) must be the largest text on the entire poster
- Background photo should show through clearly in the top half
- Version ${v}`;

      let staticResult = null;
      for (let fetchAttempt = 0; fetchAttempt < 2; fetchAttempt++) {
        try {
          const res = await fetch('/api/generate-static', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, referenceImageUrl: DRIVE.refEstatico, backgroundImageUrl: DRIVE.localizacao }),
          });
          const rawText = await res.text();
          try { staticResult = JSON.parse(rawText); } catch {
            if (fetchAttempt === 0) { await new Promise(r => setTimeout(r, 5000)); continue; }
            errs.push(`v${v}: API retornou erro: ${rawText.substring(0, 150)}`); break;
          }
          if (staticResult.url) break;
          if (staticResult.error && fetchAttempt === 0) { await new Promise(r => setTimeout(r, 5000)); staticResult = null; continue; }
          break;
        } catch (fetchErr) {
          if (fetchAttempt === 0) { await new Promise(r => setTimeout(r, 5000)); continue; }
          errs.push(`v${v}: ${fetchErr.message}`); break;
        }
      }
      if (staticResult?.url) {
        vers.push({ url: staticResult.url, type: 'image', engine: 'gpt5-image', version: v });
        dispatch({ type: 'ADD_CHAT', agent: 'agent04', text: `Versao ${v} gerada com sucesso!`, msgType: 'success' });
      } else if (staticResult?.error) {
        errs.push(`v${v}: ${staticResult.error}`);
      }
    }

    dispatch({ type: 'SET_RESULTS', piece: 1, items: vers });
    dispatch({ type: 'SET_ERRORS', piece: 1, errors: errs });

    if (vers.length > 0) {
      setStatus('done');
      dispatch({ type: 'ADD_CHAT', agent: 'agent04', text: `${vers.length} versao(oes) gerada(s). Enviando para aprovacao do Agente 06.`, msgType: 'success' });
      setTimeout(() => { dispatch({ type: 'SET_CURRENT_PIECE', piece: 1 }); dispatch({ type: 'NAVIGATE', page: 'agent06' }); }, 1500);
    } else {
      setStatus('error');
      dispatch({ type: 'ADD_CHAT', agent: 'agent04', text: `Erro ao gerar estatico: ${errs.join(', ')}`, msgType: 'error' });
    }
  };

  useEffect(() => {
    if (!started.current) { started.current = true; generateStatic(); }
  }, []);

  return (
    <AgentPageLayout num="04" role="Diretor de Arte" icon="🎨" chatMessages={msgs}>
      {status === 'running' && (
        <div className="bg-white rounded-xl border border-sea-coral p-6 text-center">
          <div className="w-12 h-12 border-4 border-sea-coral border-t-transparent rounded-full spinner mx-auto mb-4" />
          <p className="font-display font-bold">{progress}</p>
          <p className="text-xs text-gray-500 mt-2">{formatTimer(elapsed)}</p>
        </div>
      )}
    </AgentPageLayout>
  );
}

    const clips = [];

    for (let batch = 0; batch < 3; batch++) {
      const batchNames = ['Fachada', 'Rooftop', 'Localizacao'];
      setProgress(`Bloco ${batch + 1}/3 (${batchNames[batch]})...`);
      dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: `Gerando clips do bloco ${batch + 1}/3 (${batchNames[batch]}) via Kling...`, msgType: 'progress' });
      const batchCenas = CENAS.slice(batch * 3, batch * 3 + 3);
      const batchResults = await Promise.all(batchCenas.map(async (cena) => {
        const r = await generateVideo({ prompt: cena.prompt, engine: 'kling', imageUrl: cena.url, format: '9:16' });
        if (r.url) return { url: r.url, lettering: letterings[cena.bloco] || '', duration: cena.clipDuration };
        errs.push(`${cena.name}: ${r.error || 'Sem URL'}`); return null;
      }));
      clips.push(...batchResults.filter(Boolean));
      if (batch < 2) await new Promise(r => setTimeout(r, 2000));
    }

    let audioUrl = null;
    setProgress('Gerando narracao via ElevenLabs...');
    dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: 'Gerando narracao com voz da Monica via ElevenLabs...', msgType: 'progress' });
    const audioResult = await safeFetchOnce('/api/generate-audio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: fullNarration }) });
    if (audioResult.audio) audioUrl = `data:audio/mp3;base64,${audioResult.audio}`;
    else if (audioResult.error) errs.push(`audio: ${audioResult.error}`);

    if (clips.length > 0) {
      setProgress('Montando video final via Creatomate...');
      dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: `Montando video final com ${clips.length} clips via Creatomate...`, msgType: 'progress' });
      const compResult = await safeFetchOnce('/api/compose-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clips, audioUrl, duration: 15, type: 'narrado' }) });
      if (compResult.url) {
        vers.push({ url: compResult.url, type: 'video', engine: 'creatomate', version: 1 });
      } else if (compResult.renderId) {
        const videoUrl = await pollCreatomateRender(compResult.renderId, (msg) => setProgress(msg));
        if (videoUrl) vers.push({ url: videoUrl, type: 'video', engine: 'creatomate', version: 1 });
        else errs.push('montagem: render falhou');
      } else { errs.push(`montagem: ${compResult.error || 'Sem URL'}`); }
    }

    return { vers, errs };
  };

  const generateApresentadora = async () => {
    dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: 'Iniciando geracao do Video Apresentadora 30s...', msgType: 'progress' });
    const roteiro = state.roteiroTexts[3] || '';
    const falas = (roteiro.match(/Monica fala:\s*"([^"]+)"/g) || []).map(f => f.replace(/Monica fala:\s*"/, '').replace(/"$/, '').replace(/\s*\(\d+\s*palavras?\)\s*/gi, '').replace(/\s*\[\d+\s*palavras?\]\s*/gi, '').trim());
    const letteringMatches = roteiro.match(/Lettering:\s*(.+)/g) || [];
    const letterings = letteringMatches.map(l => l.replace(/Lettering:\s*/, '').replace(/\s*\(\d+\s*palavras?\)\s*/gi, '').replace(/\s*\[\d+\s*palavras?\]\s*/gi, '').trim());
    const fullNarration = falas.join(' ') || 'Eu sou a Monica, socia fundadora da Seazone.';

    const MONICA_PHOTOS = [DRIVE.monica, 'https://lh3.googleusercontent.com/d/1fiiABMSD7pmkS5OfxazrgOu7LZuj2E9W=s1920'];
    const CENAS = [
      { name: 'Monica Intro', engine: 'kling3', url: MONICA_PHOTOS[0], clipDuration: 8, prompt: 'Brazilian woman with brown hair walking on the beach barefoot on the sand, speaking naturally to camera, confident and approachable, golden hour warm light, ocean waves in background, wearing casual elegant outfit, speaking in Brazilian Portuguese, cinematic shallow depth of field' },
      { name: 'Fachada', engine: 'kling', url: DRIVE.fachada, clipDuration: 5, prompt: 'Slow cinematic tilt up modern building facade, golden hour, premium architecture, warm light' },
      { name: 'Rooftop', engine: 'kling', url: DRIVE.rooftop, clipDuration: 5, prompt: 'Gentle pan luxury rooftop infinity pool, ocean panorama view, golden hour, resort feel' },
      { name: 'Localizacao', engine: 'kling', url: DRIVE.localizacao, clipDuration: 5, prompt: 'Aerial push forward Brazilian coastline, turquoise ocean, white sand beach, golden hour' },
      { name: 'Monica CTA', engine: 'kling3', url: MONICA_PHOTOS[1], clipDuration: 7, prompt: 'Brazilian woman on the beach smiling, speaking with enthusiasm to camera, warm golden hour, ocean behind, natural and inviting tone, cinematic vertical video' },
    ];

    const vers = [];
    const errs = [];
    const clips = new Array(CENAS.length).fill(null);

    // Monica clips
    setProgress('Gerando clips da Monica (Kling 3.0 Pro)...');
    dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: 'Gerando clips da Monica via Kling 3.0 Pro...', msgType: 'progress' });
    const monicaCenas = CENAS.map((c, i) => ({ ...c, idx: i })).filter(c => c.engine === 'kling3');
    await Promise.all(monicaCenas.map(async (cena) => {
      const r = await generateVideo({ prompt: cena.prompt, engine: 'kling3', imageUrl: cena.url, format: '9:16', duration: '10' });
      if (r.url) clips[cena.idx] = { url: r.url, lettering: letterings[cena.idx] || '', duration: cena.clipDuration };
      else errs.push(`${cena.name}: ${r.error || 'Sem URL'}`);
    }));

    await new Promise(r => setTimeout(r, 2000));

    // Empreendimento clips
    setProgress('Gerando cenas do empreendimento...');
    dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: 'Gerando cenas do empreendimento via Kling...', msgType: 'progress' });
    const empCenas = CENAS.map((c, i) => ({ ...c, idx: i })).filter(c => c.engine === 'kling');
    await Promise.all(empCenas.map(async (cena) => {
      const r = await generateVideo({ prompt: cena.prompt, engine: 'kling', imageUrl: cena.url, format: '9:16' });
      if (r.url) clips[cena.idx] = { url: r.url, lettering: letterings[cena.idx] || '', duration: cena.clipDuration };
      else errs.push(`${cena.name}: ${r.error || 'Sem URL'}`);
    }));

    const validClips = clips.filter(Boolean);

    let audioUrl = null;
    setProgress('Gerando narracao...');
    dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: 'Gerando narracao com voz da Monica via ElevenLabs...', msgType: 'progress' });
    const audioResult = await safeFetchOnce('/api/generate-audio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: fullNarration }) });
    if (audioResult.audio) audioUrl = `data:audio/mp3;base64,${audioResult.audio}`;
    else if (audioResult.error) errs.push(`audio: ${audioResult.error}`);

    if (validClips.length > 0) {
      setProgress('Montando video final...');
      dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: `Montando video final com ${validClips.length} clips via Creatomate...`, msgType: 'progress' });
      const r = await safeFetchOnce('/api/compose-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clips: validClips, audioUrl, duration: 30, type: 'apresentadora' }) });
      if (r.url) {
        vers.push({ url: r.url, type: 'video', engine: 'creatomate', version: 1 });
      } else if (r.renderId) {
        const videoUrl = await pollCreatomateRender(r.renderId, (msg) => setProgress(msg));
        if (videoUrl) vers.push({ url: videoUrl, type: 'video', engine: 'creatomate', version: 1 });
        else errs.push('montagem: render falhou');
      } else { errs.push(`montagem: ${r.error || 'Sem URL'}`); }
    }

    return { vers, errs };
  };

  useEffect(() => {
    if (!started.current) {
      started.current = true;
      (async () => {
        setStatus('running');
        dispatch({ type: 'CLEAR_CHAT', agent: 'agent05' });
        const result = pn === 2 ? await generateNarrado() : await generateApresentadora();
        dispatch({ type: 'SET_RESULTS', piece: pn, items: result.vers });
        dispatch({ type: 'SET_ERRORS', piece: pn, errors: result.errs });

        if (result.vers.length > 0) {
          setStatus('done');
          dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: `${PIECE_NAMES[pn]} gerado! Enviando para aprovacao do Agente 06.`, msgType: 'success' });
          setTimeout(() => { dispatch({ type: 'SET_CURRENT_PIECE', piece: pn }); dispatch({ type: 'NAVIGATE', page: 'agent06' }); }, 1500);
        } else {
          setStatus('error');
          dispatch({ type: 'ADD_CHAT', agent: 'agent05', text: `Erro ao gerar ${PIECE_NAMES[pn]}: ${result.errs.join(', ')}`, msgType: 'error' });
        }
      })();
    }
  }, []);

  return (
    <AgentPageLayout num="05" role="Produtor de Video" icon="🎬" chatMessages={msgs}>
      {status === 'running' && (
        <div className="bg-white rounded-xl border border-sea-coral p-6 text-center">
          <div className="w-12 h-12 border-4 border-sea-coral border-t-transparent rounded-full spinner mx-auto mb-4" />
          <p className="font-display font-bold">{PIECE_NAMES[pn]}</p>
          <p className="text-sm text-gray-600 mt-1">{progress}</p>
          <p className="text-xs text-gray-500 mt-2">{formatTimer(elapsed)}</p>
        </div>
      )}
      {status === 'error' && (
        <div className="flex justify-center mt-4">
          <button onClick={() => { started.current = false; setStatus('idle'); dispatch({ type: 'CLEAR_PIECE', piece: pn }); }}
            className="border border-red-300 text-red-600 hover:bg-red-50 font-bold px-4 py-2 rounded-lg text-sm">
            Tentar Novamente
          </button>
        </div>
      )}
    </AgentPageLayout>
  );
}

// ============================================================
// AGENT 06 — VALIDADOR FINAL
// ============================================================

function Agent06({ state, dispatch }) {
  const pn = state.currentPiece;
  const items = state.results[pn] || [];
  const errs = state.pieceErrors[pn] || [];
  const [saving, setSaving] = useState(false);
  const msgs = state.chatMessages['agent06'] || [];
  const projectName = state.briefingData?.projeto?.nome || 'Empreendimento';
  const initRef = useRef(false);

  useEffect(() => {
    if (!initRef.current) {
      initRef.current = true;
      dispatch({ type: 'CLEAR_CHAT', agent: 'agent06' });
      if (items.length > 0) {
        dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: `Aqui esta(ao) a(s) versao(oes) da ${PIECE_NAMES[pn]}. Revise e aprove a melhor.`, msgType: 'info' });
      } else {
        dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: `Nenhuma versao gerada da ${PIECE_NAMES[pn]}. Erros: ${errs.join(', ')}`, msgType: 'error' });
      }
    }
  }, []);

  const handleApprove = async (item) => {
    setSaving(true);
    dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: 'Salvando no Vercel Blob...', msgType: 'progress' });
    const pieceTypes = { 1: 'estatico', 2: 'narrado', 3: 'apresentadora' };
    try {
      const ext = item.type === 'video' ? 'mp4' : 'png';
      const res = await fetch('/api/save-approved', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileUrl: item.url, pieceNumber: pn, pieceType: pieceTypes[pn], projectName, fileName: `${pieceTypes[pn]}-v${item.version}.${ext}` }),
      });
      const result = await res.json();
      if (result.url) {
        dispatch({ type: 'APPROVE_PIECE', piece: pn, item: { ...item, savedUrl: result.url } });
        dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: `${PIECE_NAMES[pn]} aprovada e salva com sucesso!`, msgType: 'success' });

        // Navigate to next
        setTimeout(() => {
          if (pn === 1) {
            dispatch({ type: 'SET_CURRENT_PIECE', piece: 2 });
            dispatch({ type: 'NAVIGATE', page: 'agent05' });
          } else if (pn === 2) {
            dispatch({ type: 'SET_CURRENT_PIECE', piece: 3 });
            dispatch({ type: 'NAVIGATE', page: 'agent05' });
          } else {
            dispatch({ type: 'NAVIGATE', page: 'final' });
          }
        }, 1500);
      }
    } catch (err) {
      dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: `Erro ao salvar: ${err.message}`, msgType: 'error' });
    }
    setSaving(false);
  };

  const handleReject = () => {
    dispatch({ type: 'ADD_CHAT', agent: 'agent06', text: `${PIECE_NAMES[pn]} reprovada. Voltando para refazer.`, msgType: 'warning' });
    dispatch({ type: 'CLEAR_PIECE', piece: pn });
    setTimeout(() => {
      if (pn === 1) dispatch({ type: 'NAVIGATE', page: 'agent04' });
      else dispatch({ type: 'NAVIGATE', page: 'agent05' });
    }, 500);
  };

  return (
    <AgentPageLayout num="06" role="Validador Final" icon="✅" chatMessages={msgs}>
      {/* Versions to approve */}
      {items.length > 0 && (
        <div className="space-y-4">
          <div className={`grid ${items.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} gap-4`}>
            {items.map((item, idx) => (
              <div key={idx} className="bg-white rounded-xl border border-gray-200 overflow-hidden">
                {item.type === 'video' ? (
                  <video src={item.url} controls className="w-full" />
                ) : (
                  <img src={item.url} alt="" className="w-full" />
                )}
                <div className="p-3 flex items-center justify-between">
                  <span className="text-xs text-gray-500">Versao {item.version} — {item.engine}</span>
                  <button onClick={() => handleApprove(item)} disabled={saving}
                    className="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white font-bold px-4 py-2 rounded-lg text-xs">
                    {saving ? 'Salvando...' : 'Aprovar'}
                  </button>
                </div>
              </div>
            ))}
          </div>

          {/* Reference for static */}
          {pn === 1 && (
            <div>
              <p className="text-[10px] font-bold text-gray-500 mb-1 uppercase">Referencia</p>
              <img src={DRIVE.refEstatico} alt="Ref" className="w-1/3 rounded-lg border-2 border-dashed border-orange-300" />
            </div>
          )}

          <div className="flex justify-end">
            <button onClick={handleReject}
              className="border border-red-300 text-red-600 hover:bg-red-50 font-bold px-4 py-2 rounded-lg text-sm">
              Reprovar e Refazer
            </button>
          </div>
        </div>
      )}

      {/* Errors only */}
      {items.length === 0 && errs.length > 0 && (
        <div className="space-y-2">
          {errs.map((e, i) => <p key={i} className="text-xs text-red-600 bg-red-50 px-3 py-2 rounded-lg">{e}</p>)}
          <button onClick={handleReject}
            className="border border-sea-coral text-sea-coral hover:bg-sea-coral/5 font-bold px-4 py-2 rounded-lg text-sm">
            Tentar Novamente
          </button>
        </div>
      )}
    </AgentPageLayout>
  );
}

// ============================================================
// FINAL PANEL
// ============================================================

function FinalPanel({ state, dispatch }) {
  const projectName = state.briefingData?.projeto?.nome || 'Empreendimento';
  const approved = state.approvedPieces;

  return (
    <div className="fade-in">
      <div className="bg-sea-dark rounded-xl p-8 text-white text-center mb-6">
        <div className="text-5xl mb-4">🎉</div>
        <h2 className="font-display font-bold text-2xl mb-2">Pacote completo e salvo!</h2>
        <p className="text-white/60 text-sm mb-6">{projectName} — 3/3 pecas aprovadas</p>

        <div className="bg-white/10 rounded-lg p-5 mb-6 text-left max-w-md mx-auto">
          <p className="text-xs font-bold text-white/80 mb-3 uppercase">IAs utilizadas no resultado final:</p>
          <div className="space-y-2 text-sm text-white/70">
            <p>🖼️ <strong className="text-white">GPT-5 Image</strong> — peca estatica</p>
            <p>🎬 <strong className="text-white">Kling v2.1</strong> — animacao de cenas (fachada, rooftop, localizacao)</p>
            <p>👩 <strong className="text-white">Kling 3.0 Pro</strong> — video da Monica apresentadora</p>
            <p>🎙️ <strong className="text-white">ElevenLabs</strong> — voz clonada da Monica</p>
            <p>🎞️ <strong className="text-white">Creatomate</strong> — montagem final dos videos</p>
            <p>🧠 <strong className="text-white">Claude Sonnet</strong> — roteiros e validacao</p>
          </div>
        </div>
      </div>

      {/* Approved pieces gallery */}
      <div className="space-y-4 mb-6">
        {[1, 2, 3].map(pn => {
          const item = approved[pn];
          if (!item) return null;
          return (
            <div key={pn} className="bg-white rounded-xl border border-emerald-200 overflow-hidden">
              <div className="flex items-center gap-2 px-4 py-3 bg-emerald-50">
                <span className="text-lg">{PIECE_ICONS[pn]}</span>
                <span className="font-bold text-sm">{PIECE_NAMES[pn]}</span>
                <span className="text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full ml-auto">Aprovado</span>
              </div>
              <div className="p-4">
                {item.type === 'video' ? (
                  <video src={item.url} controls className="w-full rounded-lg" />
                ) : (
                  <img src={item.url} alt="" className="w-full rounded-lg" />
                )}
                {item.savedUrl && (
                  <a href={item.savedUrl} target="_blank" rel="noopener" className="block text-xs text-emerald-700 hover:underline mt-2 truncate">
                    Salvo: {item.savedUrl}
                  </a>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div className="text-center">
        <button onClick={() => dispatch({ type: 'RESET' })}
          className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-8 py-3 rounded-lg text-sm">
          Novo Briefing
        </button>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [state, dispatch] = useReducer(appReducer, initialState);

  const renderPage = () => {
    switch (state.page) {
      case 'home': return <HomePage dispatch={dispatch} />;
      case 'agent01': return <Agent01 state={state} dispatch={dispatch} />;
      case 'agent02': return <Agent02 key="agent02" state={state} dispatch={dispatch} />;
      case 'agent04': return <Agent04 key={`agent04-${state.currentPiece}`} state={state} dispatch={dispatch} />;
      case 'agent05': return <Agent05 key={`agent05-${state.currentPiece}`} state={state} dispatch={dispatch} />;
      case 'agent06': return <Agent06 key={`agent06-${state.currentPiece}`} state={state} dispatch={dispatch} />;
      case 'final': return <FinalPanel state={state} dispatch={dispatch} />;
      default: return <HomePage dispatch={dispatch} />;
    }
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <Header />
      <div className="max-w-4xl mx-auto px-4 py-6">
        {state.page !== 'home' && <ProgressBar currentPage={state.page} />}
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
