<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ============================================================
// TIMER HOOK
// ============================================================

function useAgentTimers(currentAgent) {
  const [timers, setTimers] = useState({});
  const intervalsRef = useRef({});

  useEffect(() => {
    // When currentAgent changes, start timer for it and stop previous
    if (currentAgent < 2 || currentAgent > 6) return;

    const agentKey = currentAgent;

    // Mark start time if not already started
    setTimers(prev => {
      if (prev[agentKey]?.start) return prev;
      return { ...prev, [agentKey]: { start: Date.now(), elapsed: 0, done: false } };
    });

    // Start interval for current agent
    if (intervalsRef.current[agentKey]) clearInterval(intervalsRef.current[agentKey]);
    intervalsRef.current[agentKey] = setInterval(() => {
      setTimers(prev => {
        const t = prev[agentKey];
        if (!t || t.done) return prev;
        return { ...prev, [agentKey]: { ...t, elapsed: Date.now() - t.start } };
      });
    }, 100);

    // Finalize previous agent
    const prevAgent = agentKey - 1;
    if (prevAgent >= 2 && intervalsRef.current[prevAgent]) {
      clearInterval(intervalsRef.current[prevAgent]);
      setTimers(prev => {
        const t = prev[prevAgent];
        if (!t) return prev;
        return { ...prev, [prevAgent]: { ...t, elapsed: Date.now() - t.start, done: true } };
      });
    }

    return () => {
      if (intervalsRef.current[agentKey]) clearInterval(intervalsRef.current[agentKey]);
    };
  }, [currentAgent]);

  // When pipeline finishes (currentAgent > 6), stop last timer
  useEffect(() => {
    if (currentAgent > 6) {
      Object.keys(intervalsRef.current).forEach(k => clearInterval(intervalsRef.current[k]));
      setTimers(prev => {
        const updated = { ...prev };
        Object.keys(updated).forEach(k => {
          if (!updated[k].done) {
            updated[k] = { ...updated[k], elapsed: Date.now() - updated[k].start, done: true };
          }
        });
        return updated;
      });
    }
  }, [currentAgent]);

  return timers;
}

function formatTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  const tenths = Math.floor((ms % 1000) / 100);
  if (min > 0) return `${min}m ${sec.toString().padStart(2, '0')}s`;
  return `${sec}.${tenths}s`;
}

// ============================================================
// AGENT 01 — BRIEFING VALIDATOR (runs in browser)
// ============================================================

const REQUIRED_SECTIONS = [
  {
    key: 'projeto',
    label: 'Projeto',
    fields: [
      { path: 'nome', label: 'Nome' },
      { path: 'endereco', label: 'Endereço' },
      { path: 'cidade', label: 'Cidade' },
      { path: 'tipo', label: 'Tipo' },
    ],
  },
  {
    key: 'dados_financeiros',
    label: 'Dados Financeiros',
    fields: [
      { path: 'ticket_medio.valor', label: 'Ticket médio' },
      { path: 'roi_estimado.valor', label: 'ROI estimado' },
      { path: 'rentabilidade_liquida_estimada.valor', label: 'Rentabilidade líquida' },
      { path: 'valorizacao_estimada.valor', label: 'Valorização estimada' },
      { path: 'rendimento_mensal_estimado', label: 'Rendimento mensal' },
      { path: 'estrutura.quantidade_cotas', label: 'Quantidade de cotas' },
      { path: 'panorama_competitivo', label: 'Panorama competitivo', isObject: true },
    ],
  },
  {
    key: 'localizacao',
    label: 'Localização',
    fields: [
      { path: 'caracteristicas_principais', label: 'Características principais', isArray: true, minItems: 1 },
    ],
  },
  {
    key: 'pontos_fortes',
    label: 'Pontos Fortes',
    fields: [
      { path: 'hierarquia', label: 'Hierarquia de pontos fortes', isArray: true, minItems: 3 },
    ],
  },
  {
    key: 'dos',
    label: "DO's",
    fields: [
      { path: 'diretrizes', label: 'Diretrizes DO', isArray: true, minItems: 1 },
    ],
  },
  {
    key: 'donts',
    label: "DON'Ts",
    fields: [
      { path: 'diretrizes', label: 'Diretrizes DON\'T', isArray: true, minItems: 1 },
    ],
  },
  {
    key: 'publico_alvo',
    label: 'Público-Alvo',
    fields: [
      { path: 'prioridades', label: 'Prioridades de público', isArray: true, minItems: 1 },
    ],
  },
  {
    key: 'perfil_hospede',
    label: 'Perfil do Hóspede',
    fields: [
      { path: 'tipo_principal', label: 'Tipo principal' },
      { path: 'fatores_decisao', label: 'Fatores de decisão', isArray: true, minItems: 1 },
    ],
  },
  {
    key: 'estrutura_criativos',
    label: 'Estrutura de Criativos',
    fields: [
      { path: 'pontos_fortes_obrigatorios', label: 'Pontos fortes obrigatórios', isArray: true, minItems: 1 },
      { path: 'formatos', label: 'Formatos', isArray: true, minItems: 1 },
      { path: 'instrucoes_visuais_obrigatorias', label: 'Instruções visuais', isArray: true, minItems: 1 },
    ],
  },
];

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
}

function validateBriefing(data) {
  const results = [];
  let allPassed = true;

  for (const section of REQUIRED_SECTIONS) {
    const sectionData = data[section.key];
    const fieldResults = [];
    let sectionPassed = true;

    if (!sectionData) {
      results.push({
        key: section.key,
        label: section.label,
        passed: false,
        error: 'Seção inteira ausente do briefing',
        fields: [],
      });
      allPassed = false;
      continue;
    }

    for (const field of section.fields) {
      const value = getNestedValue(sectionData, field.path);
      let passed = true;
      let error = null;

      if (field.isArray) {
        if (!Array.isArray(value) || value.length < (field.minItems || 1)) {
          passed = false;
          error = `Array vazio ou com menos de ${field.minItems || 1} item(ns)`;
        }
      } else if (field.isObject) {
        if (!value || typeof value !== 'object' || Object.keys(value).length === 0) {
          passed = false;
          error = 'Objeto vazio ou ausente';
        }
      } else {
        if (value === undefined || value === null || value === '') {
          passed = false;
          error = 'Campo vazio ou ausente';
        }
      }

      if (!passed) sectionPassed = false;
      // Always pass the value (even if failed) for display purposes
      const displayValue = field.isArray ? (Array.isArray(value) ? `${value.length} item(ns)` : null) :
                           field.isObject ? (value ? `${Object.keys(value).length} campo(s)` : null) :
                           value;
      fieldResults.push({ path: field.path, label: field.label, passed, error, value: displayValue });
    }

    if (!sectionPassed) allPassed = false;
    results.push({ key: section.key, label: section.label, passed: sectionPassed, fields: fieldResults });
  }

  return { allPassed, results };
}

// ============================================================
// COMPONENTS
// ============================================================

function Header() {
  return (
    <header className="bg-sea-dark text-white">
      <div className="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
        <div className="w-8 h-8 bg-sea-coral rounded-lg flex items-center justify-center">
          <span className="font-bold text-sm">S</span>
        </div>
        <div>
          <h1 className="font-display font-bold text-lg leading-tight">Máquina de Criativos</h1>
          <p className="text-[10px] text-white/50">Seazone — Geração autônoma de criativos</p>
        </div>
      </div>
    </header>
  );
}

function StepIndicator({ steps, currentStep }) {
  return (
    <div className="flex items-center gap-1 overflow-x-auto pb-2">
      {steps.map((s, i) => (
        <div key={i} className="flex items-center gap-1 flex-shrink-0">
          <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all
            ${i < currentStep ? 'bg-sea-green text-white' :
              i === currentStep ? 'bg-sea-coral text-white ring-2 ring-sea-coral/30' :
              'bg-gray-200 text-gray-400'}`}>
            {i < currentStep ? '✓' : i + 1}
          </div>
          {i < steps.length - 1 && (
            <div className={`w-6 h-0.5 ${i < currentStep ? 'bg-sea-green' : 'bg-gray-200'}`} />
          )}
        </div>
      ))}
    </div>

}

function AgentHeader({ number, name, status }) {
  const colors = {
    idle: 'bg-gray-100 text-gray-400',
    running: 'bg-yellow-100 text-yellow-700',
    success: 'bg-emerald-100 text-emerald-700',
    error: 'bg-red-100 text-red-700',
  };
  const labels = {
    idle: 'Aguardando',
    running: 'Rodando...',
    success: 'Aprovado',
    error: 'Reprovado',
  };
  return (
    <div className="flex items-center justify-between mb-4">
      <div className="flex items-center gap-3">
        <span className="text-xs font-mono bg-sea-dark text-white px-2 py-1 rounded">#{number}</span>
        <h2 className="font-display font-bold text-xl">{name}</h2>
      </div>
      <span className={`text-xs font-medium px-3 py-1 rounded-full ${colors[status]}`}>
        {status === 'running' && <span className="inline-block w-2 h-2 bg-yellow-500 rounded-full mr-1.5 pulse" />}
        {labels[status]}
      </span>
    </div>
  );
}

// ============================================================
// STEP 1 — INPUT URL
// ============================================================

function Step1_Input({ onSubmit }) {
  const [url, setUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleSubmit = async () => {
    if (!url.trim()) return;
    setLoading(true);
    setError(null);

    let briefingUrl = url.trim();
    if (!briefingUrl.endsWith('/briefing.json')) {
      briefingUrl = briefingUrl.replace(/\/$/, '') + '/briefing.json';
    }

    try {
      // Try multiple approaches to fetch the briefing
      let data = null;
      const proxies = [
        briefingUrl, // direct
        `https://api.allorigins.win/raw?url=${encodeURIComponent(briefingUrl)}`,
        `https://corsproxy.io/?${encodeURIComponent(briefingUrl)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(briefingUrl)}`,
      ];

      for (const url of proxies) {
        try {
          const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
          if (res.ok) {
            const text = await res.text();
            data = JSON.parse(text);
            break;
          }
        } catch (e) { continue; }
      }

      if (!data) throw new Error('Não foi possível acessar o briefing. Verifique se a URL está correta e se o arquivo briefing.json existe.');
      onSubmit(data, briefingUrl);
    } catch (err) {
      setError(err.message || 'Não foi possível acessar o briefing. Verifique a URL.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fade-in">
      <AgentHeader number="01" name="Validador de Briefing" status="idle" />
      <div className="bg-white rounded-xl border-2 border-dashed border-gray-300 p-8 text-center">
        <div className="w-16 h-16 bg-sea-dark/5 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">📋</div>
        <h3 className="font-display font-bold text-lg mb-2">Cole a URL do Lovable</h3>
        <p className="text-sm text-gray-500 mb-6">A máquina vai buscar o briefing.json e validar todas as seções obrigatórias</p>
        <div className="max-w-xl mx-auto">
          <div className="flex gap-2">
            <input
              type="url"
              value={url}
              onChange={e => setUrl(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSubmit()}
              placeholder="https://nomedoempreendimento.lovable.app"
              className="flex-1 border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-sea-coral focus:ring-2 focus:ring-sea-coral/20"
            />
            <button
              onClick={handleSubmit}
              disabled={loading || !url.trim()}
              className="bg-sea-coral hover:bg-sea-coral/90 disabled:bg-gray-300 text-white font-bold px-6 py-3 rounded-lg text-sm transition-colors flex items-center gap-2"
            >
              {loading ? (
                <><svg className="w-4 h-4 spinner" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="32" strokeLinecap="round"/></svg> Buscando...</>
              ) : 'Validar'}
            </button>
          </div>
          {error && (
            <div className="mt-3 bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700 text-left fade-in">
              ❌ {error}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// STEP 2 — VALIDATION RESULTS
// ============================================================

function Step2_Validation({ data, url, onApproved, onReset }) {
  const validation = validateBriefing(data);
  const projectName = data.projeto?.nome || 'Empreendimento sem nome';
  const passedCount = validation.results.filter(r => r.passed).length;

  return (
    <div className="fade-in">
      <AgentHeader number="01" name="Validador de Briefing" status={validation.allPassed ? 'success' : 'error'} />

      {/* Summary */}
      <div className={`rounded-xl p-5 mb-6 ${validation.allPassed ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-display font-bold text-lg">
            {validation.allPassed ? '✅' : '❌'} {projectName}
          </h3>
          <span className={`text-sm font-bold ${validation.allPassed ? 'text-emerald-600' : 'text-red-600'}`}>
            {passedCount}/{validation.results.length} seções
          </span>
        </div>
        <p className="text-sm text-gray-600 mb-1">{url}</p>
        {validation.allPassed ? (
          <p className="text-sm text-emerald-700 font-medium">Briefing completo. Pronto para o Agente 02.</p>
        ) : (
          <p className="text-sm text-red-700 font-medium">Briefing incompleto. Corrija os itens abaixo no Lovable e rode novamente.</p>
        )}
      </div>

      {/* Section by section — with values */}
      <div className="space-y-3 mb-6">
        {validation.results.map(section => (
          <div key={section.key} className={`bg-white rounded-xl border overflow-hidden transition-all ${section.passed ? 'border-emerald-200' : 'border-red-200'}`}>
            <div className={`flex items-center gap-3 px-4 py-3 ${section.passed ? 'bg-emerald-50' : 'bg-red-50'}`}>
              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${section.passed ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                {section.passed ? '✓' : '✕'}
              </div>
              <span className="font-display font-bold text-sm">{section.label}</span>
              {!section.passed && section.error && (
                <span className="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full ml-auto">{section.error}</span>
              )}
              {section.passed && (
                <span className="text-xs text-emerald-600 ml-auto">Completo</span>
              )}
            </div>
            {section.fields.length > 0 && (
              <div className="divide-y divide-gray-100">
                {section.fields.map(f => (
                  <div key={f.path} className={`flex items-center justify-between px-4 py-2.5 ${f.passed ? '' : 'bg-red-50/50'}`}>
                    <div className="flex items-center gap-2">
                      <span className={`text-sm ${f.passed ? 'text-emerald-500' : 'text-red-500'}`}>
                        {f.passed ? '✓' : '✕'}
                      </span>
                      <span className="text-sm text-gray-700">{f.label}</span>
                    </div>
                    <div className="text-right">
                      {f.passed && f.value ? (
                        <span className="text-sm font-medium text-gray-900 bg-emerald-50 px-2 py-0.5 rounded">
                          {typeof f.value === 'string' && f.value.length > 50 ? f.value.substring(0, 50) + '...' : f.value}
                        </span>
                      ) : !f.passed ? (
                        <span className="text-xs font-medium text-red-600 bg-red-100 px-2 py-0.5 rounded">
                          {f.error || 'Ausente'}
                        </span>
                      ) : null}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Actions */}
      <div className="flex gap-3">
        <button onClick={onReset} className="border border-gray-300 text-gray-600 px-4 py-2.5 rounded-lg text-sm hover:bg-gray-50 transition-colors">
          ← Novo briefing
        </button>
        {validation.allPassed && (
          <button onClick={() => onApproved(data)} className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition-colors flex items-center gap-2">
            Avançar para Agente 02 — Roteirista →
          </button>
        )}
        {!validation.allPassed && (
          <button onClick={onReset} className="bg-sea-coral hover:bg-sea-coral/90 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition-colors">
            Corrigir e tentar novamente
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// STEP 3+ — AGENTS 02-06 (Claude Code executes)
// ============================================================

function Step3_Pipeline({ data, currentAgent }) {
  const projectName = data.projeto?.nome || 'Empreendimento';
  const timers = useAgentTimers(currentAgent);

  const agents = [
    { n:'02', name:'Roteirista', desc:'Criando 5 roteiros cena por cena...', icon:'🎬' },
    { n:'03', name:'Validador de Roteiro', desc:'Validando roteiros contra o briefing...', icon:'✅' },
    { n:'04', name:'Diretor Criativo', desc:'Definindo formatos, IAs e prompts...', icon:'🎨' },
    { n:'05', name:'Executor Criativo', desc:'Gerando criativos via fal.ai...', icon:'⚡' },
    { n:'06', name:'Validador do Criativo', desc:'Validação final dos arquivos...', icon:'🏆' },
  ];

  // Calculate total pipeline time
  const totalTime = Object.values(timers).reduce((sum, t) => sum + (t.elapsed || 0), 0);
  const allDone = currentAgent > 6;

  return (
    <div className="fade-in">
      <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-6 flex items-center justify-between">
        <p className="text-sm text-emerald-700">✅ Briefing <strong>{projectName}</strong> validado. Pipeline em execução.</p>
        {totalTime > 0 && (
          <span className={`text-xs font-mono px-2 py-1 rounded-full ${allDone ? 'bg-emerald-200 text-emerald-800' : 'bg-yellow-100 text-yellow-800'}`}>
            Total: {formatTimer(totalTime)}
          </span>
        )}
      </div>

      <div className="space-y-3">
        {agents.map((a, i) => {
          const agentIndex = i + 2; // agents 2-6
          let status = 'idle';
          if (agentIndex < currentAgent) status = 'success';
          else if (agentIndex === currentAgent) status = 'running';

          const timer = timers[agentIndex];
          const timerDisplay = timer ? formatTimer(timer.elapsed) : null;
          const isWarning = timer && timer.elapsed > 5 * 60 * 1000; // > 5 min
          const isCritical = timer && timer.elapsed > 10 * 60 * 1000; // > 10 min

          return (
            <div key={a.n} className={`bg-white rounded-xl border p-5 transition-all ${status === 'running' ? 'border-yellow-300 shadow-md' : status === 'success' ? 'border-emerald-200' : 'border-gray-200 opacity-60'}`}>
              <div className="flex items-center gap-4">
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0
                  ${status === 'success' ? 'bg-emerald-100' : status === 'running' ? 'bg-yellow-100' : 'bg-gray-100'}`}>
                  {status === 'success' ? '✓' : a.icon}
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-mono bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">#{a.n}</span>
                    <h3 className="font-display font-bold">{a.name}</h3>
                  </div>
                  {status === 'running' && (
                    <p className="text-sm text-yellow-700 mt-1 flex items-center gap-2">
                      <span className="w-2 h-2 bg-yellow-500 rounded-full pulse" />
                      {a.desc}
                    </p>
                  )}
                  {status === 'success' && (
                    <p className="text-sm text-emerald-600 mt-1">Concluído ✓</p>
                  )}
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {timerDisplay && (
                    <span className={`text-xs font-mono px-2.5 py-1 rounded-full ${
                      status === 'success'
                        ? (isCritical ? 'bg-red-100 text-red-700' : isWarning ? 'bg-yellow-100 text-yellow-700' : 'bg-emerald-100 text-emerald-700')
                        : (isCritical ? 'bg-red-100 text-red-700' : isWarning ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600')
                    }`}>
                      {timerDisplay}
                    </span>
                  )}
                  {status === 'success' && (
                    <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full">Aprovado</span>
                  )}
                  {status === 'running' && (
                    <svg className="w-5 h-5 text-yellow-500 spinner" viewBox="0 0 24 24" fill="none">
                      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="32" strokeLinecap="round"/>
                    </svg>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {allDone && (
        <div className="mt-6 bg-sea-dark rounded-xl p-6 text-white text-center fade-in">
          <div className="text-4xl mb-3">🎉</div>
          <h3 className="font-display font-bold text-xl mb-2">Pacote completo gerado!</h3>
          <p className="text-white/60 text-sm mb-2">{projectName}</p>
          <p className="text-sm font-mono text-white/80 mb-4">Tempo total: {formatTimer(totalTime)}</p>
          <div className="grid grid-cols-3 gap-4 max-w-md mx-auto">
            <div className="bg-white/10 rounded-lg p-3">
              <p className="text-lg font-bold">2</p>
              <p className="text-[10px] text-white/50">Roteiros Monica</p>
            </div>
            <div className="bg-white/10 rounded-lg p-3">
              <p className="text-lg font-bold">6</p>
              <p className="text-[10px] text-white/50">Vídeos gerados</p>
            </div>
            <div className="bg-white/10 rounded-lg p-3">
              <p className="text-lg font-bold">3</p>
              <p className="text-[10px] text-white/50">Estáticos</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [step, setStep] = useState(1); // 1=input, 2=validation, 3=pipeline
  const [briefingData, setBriefingData] = useState(null);
  const [briefingUrl, setBriefingUrl] = useState('');
  const [currentAgent, setCurrentAgent] = useState(2);

  const STEPS = ['Briefing', 'Validação', 'Roteiros', 'Validação', 'Direção', 'Execução', 'Validação Final'];

  const handleBriefingLoaded = (data, url) => {
    setBriefingData(data);
    setBriefingUrl(url);
    setStep(2);
  };

  const handleApproved = (data) => {
    setStep(3);
    setCurrentAgent(2);
  };

  const handleReset = () => {
    setStep(1);
    setBriefingData(null);
    setBriefingUrl('');
    setCurrentAgent(2);
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <Header />
      <div className="max-w-4xl mx-auto px-4 py-6">
        {/* Step indicator */}
        <div className="mb-6">
          <StepIndicator steps={STEPS} currentStep={step - 1} />
        </div>

        {/* Content */}
        {step === 1 && <Step1_Input onSubmit={handleBriefingLoaded} />}
        {step === 2 && <Step2_Validation data={briefingData} url={briefingUrl} onApproved={handleApproved} onReset={handleReset} />}
        {step === 3 && <Step3_Pipeline data={briefingData} currentAgent={currentAgent} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
